<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danylo's Helping Tools</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070707;
      --text: #f4f4f4;
      --muted: #9a9a9a;
      --glass: rgba(18, 18, 18, 0.58);
      --glass-strong: rgba(24, 24, 24, 0.72);
      --line: rgba(255, 255, 255, 0.16);
      --line-soft: rgba(255, 255, 255, 0.08);
      --focus: rgba(255, 255, 255, 0.34);
      --secret: #cfc3a0;
      --radius: 30px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      opacity: 0.35;
    }

    .page {
      position: relative;
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding-top: clamp(72px, 13vh, 128px);
    }

    h1 {
      margin: 0 0 14px 18px;
      font-size: clamp(1.55rem, 3.2vw, 2.65rem);
      line-height: 1;
      letter-spacing: 0.02em;
      font-weight: 760;
    }

    .search-shell {
      position: relative;
    }

    .search-shell::before {
      position: absolute;
      z-index: 2;
      top: 1px;
      left: 22px;
      width: 180px;
      height: 1px;
      pointer-events: none;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.76), transparent);
      opacity: 0.95;
    }

    .search-shell::after {
      position: absolute;
      z-index: 2;
      top: 13px;
      left: 23px;
      width: 20px;
      height: 20px;
      pointer-events: none;
      content: "";
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.34), transparent 68%);
      filter: blur(0.2px);
    }

    label {
      display: block;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #search {
      width: 100%;
      min-height: 62px;
      padding: 0 26px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: none;
      color: var(--text);
      background: var(--glass);
      box-shadow:
        inset 0 1px rgba(255, 255, 255, 0.08),
        0 18px 48px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      font: inherit;
      font-size: 1rem;
      transition: border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    #search::placeholder {
      color: rgba(255, 255, 255, 0.38);
    }

    #search:focus {
      border-color: var(--focus);
      background: rgba(22, 22, 22, 0.68);
      box-shadow:
        inset 0 1px rgba(255, 255, 255, 0.11),
        0 18px 48px rgba(0, 0, 0, 0.28),
        0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .results {
      display: none;
      width: min(680px, calc(100% - 28px));
      margin: 12px 0 0 14px;
      padding: 8px;
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: var(--glass-strong);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      list-style: none;
    }

    .results[data-open="true"] {
      display: grid;
      gap: 4px;
    }

    .tool {
      display: block;
    }

    .tool a,
    .secret {
      display: block;
      padding: 12px 14px;
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.98rem;
      font-weight: 600;
    }

    .tool a:hover,
    .tool a:focus-visible {
      background: rgba(255, 255, 255, 0.07);
      outline: none;
    }

    .secret {
      color: var(--secret);
      cursor: default;
    }

    .empty {
      display: none;
      margin: 0;
      padding: 12px 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      .page {
        width: min(100% - 20px, 1220px);
        padding-top: 34px;
      }

      h1 {
        margin-left: 10px;
        font-size: 1.55rem;
      }

      #search {
        min-height: 58px;
        padding: 0 18px;
      }

      .results {
        width: 100%;
        margin-left: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Danylo's Helping Tools</h1>

    <div class="search-shell">
      <label>
        <span class="sr-only">Search tools</span>
        <input id="search" type="search" autocomplete="off" placeholder="Ask AI to open something">
      </label>
    </div>

    <ul class="results" id="tools" data-open="false"></ul>
    <p class="empty" id="empty">Couldn’t find that tool.</p>
  </main>

  <script>
    const tools = [
      {
        name: "Graph Calculator",
        url: "/graph",
        keywords: ["graph", "calculator", "math", "plot", "points", "graf"]
      },
      {
        name: "Drip Funnel Helper",
        url: "/drop",
        keywords: ["drip", "drop", "funnel", "timer", "trichter", "tropf"]
      },
      {
        name: "Orbital Model Drawer",
        url: "/orbital",
        keywords: ["orbital", "model", "atom", "quantum", "electron"]
      },
      {
        name: "Nomenclature Engine",
        url: "/nomenclature",
        keywords: ["nomenclature", "iupac", "organic", "chemistry", "bonds"]
      },
      {
        name: "Periodic Memo",
        url: "/periodicgame",
        keywords: ["periodic", "memo", "game", "elements", "chemistry"]
      },
      {
        name: "pH Predict",
        url: "/phpredictor",
        keywords: ["ph", "predict", "predictor", "acid", "base"]
      }
    ];

    const secrets = [
      {
        name: "It was a long time ago...",
        trigger: "lsd"
      }
    ];

    const search = document.getElementById("search");
    const list = document.getElementById("tools");
    const empty = document.getElementById("empty");

    function normalize(value) {
      return value.toLowerCase().trim();
    }

    function matchesTool(tool, query) {
      if (!query) return true;
      const haystack = [tool.name, ...tool.keywords].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function visibleResults() {
      return [...list.querySelectorAll("[data-url]")]
        .filter(item => item.style.display !== "none");
    }

    function render() {
      list.innerHTML = "";

      tools.forEach(tool => {
        const item = document.createElement("li");
        item.className = "tool";
        item.dataset.url = tool.url;
        item.dataset.name = tool.name;
        item.innerHTML = `<a href="${tool.url}">${tool.name}</a>`;
        list.appendChild(item);
      });

      secrets.forEach(secret => {
        const item = document.createElement("li");
        item.className = "tool";
        item.dataset.secret = secret.trigger;
        item.style.display = "none";
        item.innerHTML = `<div class="secret" aria-disabled="true">${secret.name}</div>`;
        list.appendChild(item);
      });
    }

    function setOpenState(hasResults) {
      const shouldOpen = document.activeElement === search || normalize(search.value) !== "";
      list.dataset.open = shouldOpen && hasResults ? "true" : "false";
      empty.style.display = shouldOpen && !hasResults ? "block" : "none";
    }

    function filter() {
      const query = normalize(search.value);
      let shown = 0;

      tools.forEach(tool => {
        const item = list.querySelector(`[data-url="${tool.url}"]`);
        const show = matchesTool(tool, query);
        item.style.display = show ? "block" : "none";
        if (show) shown++;
      });

      secrets.forEach(secret => {
        const item = list.querySelector(`[data-secret="${secret.trigger}"]`);
        const show = query === secret.trigger;
        item.style.display = show ? "block" : "none";
        if (show) shown++;
      });

      setOpenState(shown > 0);
    }

    search.addEventListener("focus", filter);
    search.addEventListener("input", filter);
    search.addEventListener("blur", () => {
      window.setTimeout(filter, 100);
    });
    search.addEventListener("keydown", event => {
      if (event.key !== "Enter") return;
      const query = normalize(search.value);
      if (secrets.some(secret => secret.trigger === query)) return;

      const first = visibleResults()[0];
      if (first) window.location.href = first.dataset.url;
    });

    render();
    filter();
  </script>
</body>
</html>

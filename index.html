<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danylo's Helping Tools</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070707;
      --text: #f4f4f4;
      --muted: #9a9a9a;
      --glass: rgba(18, 18, 18, 0.58);
      --glass-strong: rgba(24, 24, 24, 0.72);
      --line: rgba(255, 255, 255, 0.16);
      --line-soft: rgba(255, 255, 255, 0.08);
      --focus: rgba(255, 255, 255, 0.34);
      --secret: #cfc3a0;
      --radius: 30px;
      --space-glow: rgba(150, 178, 255, 0.16);
      --space-line: rgba(210, 222, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 22%, rgba(80, 102, 170, 0.16), transparent 34%),
        radial-gradient(circle at 12% 18%, rgba(100, 128, 255, 0.11), transparent 26%),
        radial-gradient(circle at 88% 9%, rgba(255, 255, 255, 0.06), transparent 18%),
        var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .space-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      content: "";
      background:
        radial-gradient(circle at 50% 26%, transparent 0 24%, rgba(7, 7, 7, 0.48) 62%, rgba(7, 7, 7, 0.9) 100%),
        linear-gradient(to bottom, rgba(7, 7, 7, 0.05), rgba(7, 7, 7, 0.78));
    }

    .page {
      position: relative;
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding-top: clamp(70px, 12vh, 118px);
    }

    h1 {
      margin: 0 0 22px;
      text-align: center;
      font-size: clamp(2.05rem, 5vw, 4.7rem);
      line-height: 0.95;
      letter-spacing: -0.055em;
      font-weight: 780;
      text-wrap: balance;
    }

    .name-cycle,
    .title-rest {
      display: inline-block;
      vertical-align: baseline;
    }

    .name-cycle {
      display: inline-flex;
      justify-content: center;
      vertical-align: top;
      white-space: nowrap;
    }

    .name-visual {
      display: inline-flex;
      transform: scaleX(var(--name-scale, 1));
      transform-origin: center center;
      will-change: transform;
    }

    .name-letter {
      display: inline-block;
      min-width: 0.12em;
      transform: translateY(var(--letter-y, 0));
      transition:
        opacity 90ms ease,
        transform 110ms cubic-bezier(0.22, 1, 0.36, 1),
        font-weight 60ms ease;
      will-change: transform, font-family;
    }

    .name-letter.is-stable {
      --letter-y: 0 !important;
      opacity: 1;
      transition:
        transform 260ms cubic-bezier(0.16, 1, 0.3, 1),
        opacity 130ms ease;
      will-change: auto;
    }

    .search-shell {
      position: relative;
    }

    .search-shell::before {
      position: absolute;
      z-index: 2;
      top: 1px;
      left: 22px;
      width: 180px;
      height: 1px;
      pointer-events: none;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.76), transparent);
      opacity: 0.95;
    }

    label {
      display: block;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .search-label {
      --pad-x: 30px;
      --cursor-x: 0px;
      position: relative;
      display: block;
      width: 100%;
      min-height: 62px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--glass);
      box-shadow:
        inset 0 1px rgba(255, 255, 255, 0.08),
        0 18px 48px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
      transition: border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .search-label:focus-within {
      border-color: var(--focus);
      background: rgba(22, 22, 22, 0.68);
      box-shadow:
        inset 0 1px rgba(255, 255, 255, 0.11),
        0 18px 48px rgba(0, 0, 0, 0.28),
        0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    #search {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      min-height: 100%;
      padding: 0 30px;
      border: 0;
      outline: none;
      color: transparent;
      background: transparent;
      caret-color: transparent;
      font: inherit;
      font-size: clamp(1rem, 1.45vw, 1.14rem);
      line-height: 1;
      -webkit-appearance: none;
      appearance: none;
    }

    #search::-webkit-search-decoration,
    #search::-webkit-search-cancel-button {
      display: none;
    }

    .search-display {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      padding: 0 var(--pad-x);
      color: var(--text);
      font-size: clamp(1rem, 1.45vw, 1.14rem);
      font-weight: 520;
      letter-spacing: -0.012em;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      user-select: none;
    }

    .search-display::before {
      position: absolute;
      top: 50%;
      left: var(--pad-x);
      color: rgba(255, 255, 255, 0.38);
      content: attr(data-placeholder);
      font-weight: 500;
      line-height: 1;
      opacity: 0;
      transform: translateY(-50%);
      transition: opacity 150ms ease, transform 180ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .search-label[data-empty="true"] .search-display::before {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }

    .search-label[data-empty="true"]:focus-within .search-display::before {
      opacity: 0;
      transform: translateY(-50%) translateX(4px);
    }

    .search-text {
      position: absolute;
      top: 50%;
      left: var(--pad-x);
      max-width: calc(100% - (var(--pad-x) * 2));
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.15;
      transform: translateY(-50%);
    }

    .custom-caret {
      position: absolute;
      top: 50%;
      left: calc(var(--pad-x) + var(--cursor-x) + 4px);
      width: 2px;
      height: 1.35em;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      opacity: 0;
      transform: translateY(-50%) scaleY(0.85);
      transition: left 145ms cubic-bezier(0.22, 1, 0.36, 1), opacity 260ms ease;
      will-change: left, opacity;
    }

    .search-label:focus-within .custom-caret {
      animation: caret-pulse 960ms ease-in-out infinite;
    }

    .typed-char {
      display: inline-block;
    }

    .typed-char.is-new {
      animation: char-in 180ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .search-measure {
      position: absolute;
      top: -999px;
      left: -999px;
      visibility: hidden;
      white-space: pre;
      font: inherit;
      font-size: clamp(1rem, 1.45vw, 1.14rem);
      font-weight: 520;
      letter-spacing: -0.012em;
      line-height: 1;
    }

    .results {
      display: grid;
      gap: 4px;
      width: 100%;
      max-height: 0;
      margin: 0;
      padding: 0 8px;
      overflow: hidden;
      border: 1px solid transparent;
      border-radius: 18px;
      background: var(--glass-strong);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      list-style: none;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px) scale(0.985);
      transform-origin: top center;
      transition:
        max-height 260ms cubic-bezier(0.22, 1, 0.36, 1),
        margin 180ms ease,
        padding 180ms ease,
        border-color 180ms ease,
        opacity 170ms ease,
        transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .results[data-open="true"] {
      max-height: 420px;
      margin: 12px 0 0;
      padding: 8px;
      border-color: var(--line-soft);
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .tool {
      display: block;
      transform: translateY(-4px);
      opacity: 0;
    }

    .results[data-open="true"] .tool {
      animation: suggestion-in 220ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .results[data-open="true"] .tool:nth-child(2) {
      animation-delay: 24ms;
    }

    .results[data-open="true"] .tool:nth-child(3) {
      animation-delay: 48ms;
    }

    .results[data-open="true"] .tool:nth-child(4) {
      animation-delay: 72ms;
    }

    .results[data-open="true"] .tool:nth-child(5) {
      animation-delay: 96ms;
    }

    .results[data-open="true"] .tool:nth-child(6) {
      animation-delay: 120ms;
    }

    .results[data-open="true"] .tool:nth-child(7) {
      animation-delay: 144ms;
    }

    .tool a,
    .secret {
      display: block;
      padding: 12px 14px;
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.98rem;
      font-weight: 600;
    }

    .tool a:hover,
    .tool a:focus-visible {
      background: rgba(255, 255, 255, 0.07);
      outline: none;
    }

    .secret {
      color: var(--secret);
      cursor: default;
    }

    .empty {
      display: none;
      margin: 12px 0 0;
      padding: 12px 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      .page {
        width: min(100% - 20px, 1220px);
        padding-top: 34px;
      }

      h1 {
        margin-bottom: 16px;
        font-size: 2rem;
        letter-spacing: -0.045em;
      }

      .search-label {
        min-height: 58px;
      }

      #search,
      .search-display {
        padding: 0 18px;
      }

      .search-label {
        --pad-x: 18px;
      }
    }

    @keyframes caret-pulse {
      0%,
      100% {
        opacity: 0.28;
        transform: translateY(-50%) scaleY(0.78);
      }

      45%,
      60% {
        opacity: 1;
        transform: translateY(-50%) scaleY(1);
      }
    }

    @keyframes char-in {
      from {
        opacity: 0;
        transform: translateY(0.22em);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes suggestion-in {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <canvas class="space-bg" id="space-bg" aria-hidden="true"></canvas>

  <main class="page">
    <h1>
      <span class="name-cycle" id="name-cycle" aria-label="Danylo's"><span aria-hidden="true">Danylo's</span></span>
      <span class="title-rest">Helping Tools</span>
    </h1>

    <div class="search-shell">
      <label class="search-label" id="search-label" data-empty="true">
        <span class="sr-only">Search tools</span>
        <input id="search" type="search" autocomplete="off" aria-label="Search tools">
        <span class="search-display" id="search-display" data-placeholder="Search tools..." aria-hidden="true">
          <span class="search-text" id="search-text"></span>
          <span class="custom-caret"></span>
          <span class="search-measure" id="search-measure"></span>
        </span>
      </label>
    </div>

    <ul class="results" id="tools" data-open="false"></ul>
    <p class="empty" id="empty">Couldn’t find that tool.</p>
  </main>

  <script>
    const tools = [
      {
        name: "Graph Calculator",
        url: "/graph",
        keywords: ["graph", "calculator", "math", "plot", "points", "graf"]
      },
      {
        name: "Drip Funnel Helper",
        url: "/drop",
        keywords: ["drip", "drop", "funnel", "timer", "trichter", "tropf"]
      },
      {
        name: "Orbital Model Drawer",
        url: "/orbital",
        keywords: ["orbital", "model", "atom", "quantum", "electron"]
      },
      {
        name: "Nomenclature Engine",
        url: "/nomenclature",
        keywords: ["nomenclature", "iupac", "organic", "chemistry", "bonds"]
      },
      {
        name: "Periodic Memo",
        url: "/periodicgame",
        keywords: ["periodic", "memo", "game", "elements", "chemistry"]
      },
      {
        name: "pH Predict",
        url: "/phpredictor",
        keywords: ["ph", "predict", "predictor", "acid", "base"]
      }
    ];

    const secrets = [
      {
        name: "It was a long time ago...",
        trigger: "lsd"
      }
    ];

    const search = document.getElementById("search");
    const searchLabel = document.getElementById("search-label");
    const searchText = document.getElementById("search-text");
    const searchMeasure = document.getElementById("search-measure");
    const list = document.getElementById("tools");
    const empty = document.getElementById("empty");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let previousSearchValue = "";

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalize(value) {
      return value.toLowerCase().trim();
    }

    function matchesTool(tool, query) {
      if (!query) return true;
      const haystack = [tool.name, ...tool.keywords].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function visibleResults() {
      return [...list.querySelectorAll("[data-url]")]
        .filter(item => item.style.display !== "none");
    }

    function setupSpaceBackground() {
      const canvas = document.getElementById("space-bg");
      if (!canvas) return;
      const context = canvas.getContext("2d", { alpha: true });
      if (!context) return;

      const pointer = { x: 0, y: 0, targetX: 0, targetY: 0, active: false };
      const stars = [];
      const satellites = tools.map((tool, index) => ({
        label: tool.name
          .replace(" Calculator", "")
          .replace(" Helper", "")
          .replace(" Model Drawer", "")
          .replace(" Engine", "")
          .replace(" Predict", ""),
        angle: (Math.PI * 2 * index) / tools.length,
        orbit: 0.34 + ((index % 3) * 0.055),
        speed: 0.00008 + (index * 0.000012),
        pulse: Math.random() * Math.PI * 2
      }));
      let width = 0;
      let height = 0;
      let pixelRatio = 1;
      let animationFrame = null;

      function resize() {
        pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * pixelRatio);
        canvas.height = Math.floor(height * pixelRatio);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);

        const starCount = Math.min(170, Math.max(80, Math.floor((width * height) / 9500)));
        stars.length = 0;
        for (let index = 0; index < starCount; index++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: 0.45 + Math.random() * 1.25,
            depth: 0.16 + Math.random() * 0.84,
            alpha: 0.18 + Math.random() * 0.58,
            twinkle: Math.random() * Math.PI * 2
          });
        }
      }

      function movePointer(clientX, clientY) {
        pointer.targetX = ((clientX / Math.max(width, 1)) - 0.5) * 2;
        pointer.targetY = ((clientY / Math.max(height, 1)) - 0.5) * 2;
        pointer.active = true;
      }

      window.addEventListener("pointermove", event => movePointer(event.clientX, event.clientY), { passive: true });
      window.addEventListener("pointerleave", () => {
        pointer.targetX = 0;
        pointer.targetY = 0;
        pointer.active = false;
      });
      window.addEventListener("resize", resize);

      function drawStarfield(time) {
        context.clearRect(0, 0, width, height);
        pointer.x += (pointer.targetX - pointer.x) * 0.055;
        pointer.y += (pointer.targetY - pointer.y) * 0.055;

        const glow = context.createRadialGradient(
          width * (0.5 + pointer.x * 0.025),
          height * (0.24 + pointer.y * 0.018),
          0,
          width * 0.5,
          height * 0.26,
          Math.max(width, height) * 0.58
        );
        glow.addColorStop(0, "rgba(118, 145, 255, 0.18)");
        glow.addColorStop(0.34, "rgba(118, 145, 255, 0.055)");
        glow.addColorStop(1, "rgba(7, 7, 7, 0)");
        context.fillStyle = glow;
        context.fillRect(0, 0, width, height);

        stars.forEach(star => {
          const x = star.x + pointer.x * star.depth * 18;
          const y = star.y + pointer.y * star.depth * 12;
          const alpha = star.alpha + (Math.sin(time * 0.0015 + star.twinkle) * 0.12);
          context.beginPath();
          context.fillStyle = `rgba(255, 255, 255, ${Math.max(0.04, alpha)})`;
          context.arc(x, y, star.radius, 0, Math.PI * 2);
          context.fill();
        });
      }

      function drawSatellites(time) {
        const centerX = width * (0.5 + pointer.x * 0.018);
        const centerY = Math.min(height * 0.48, 360) + pointer.y * 10;
        const orbitX = Math.min(width * 0.42, 560);
        const orbitY = Math.min(height * 0.24, 210);
        const positions = satellites.map(satellite => {
          const angle = satellite.angle + (time * satellite.speed);
          return {
            ...satellite,
            x: centerX + Math.cos(angle) * orbitX * satellite.orbit,
            y: centerY + Math.sin(angle) * orbitY * satellite.orbit,
            glow: 0.45 + (Math.sin(time * 0.002 + satellite.pulse) * 0.22)
          };
        });

        context.save();
        context.lineWidth = 1;
        context.strokeStyle = "rgba(210, 222, 255, 0.08)";
        context.beginPath();
        positions.forEach((position, index) => {
          if (index === 0) context.moveTo(position.x, position.y);
          else context.lineTo(position.x, position.y);
        });
        context.closePath();
        context.stroke();

        positions.forEach((position, index) => {
          const next = positions[(index + 2) % positions.length];
          context.beginPath();
          context.strokeStyle = `rgba(180, 202, 255, ${0.045 + position.glow * 0.035})`;
          context.moveTo(position.x, position.y);
          context.lineTo(next.x, next.y);
          context.stroke();
        });

        positions.forEach(position => {
          const dx = (pointer.targetX * width * 0.5) - (position.x - width * 0.5);
          const dy = (pointer.targetY * height * 0.5) - (position.y - height * 0.5);
          const proximity = pointer.active ? Math.max(0, 1 - (Math.hypot(dx, dy) / 520)) : 0;
          const nodeAlpha = 0.35 + position.glow * 0.25 + proximity * 0.36;

          context.beginPath();
          context.fillStyle = `rgba(235, 241, 255, ${nodeAlpha})`;
          context.shadowColor = "rgba(150, 178, 255, 0.42)";
          context.shadowBlur = 12 + proximity * 18;
          context.arc(position.x, position.y, 2.1 + proximity * 1.4, 0, Math.PI * 2);
          context.fill();
          context.shadowBlur = 0;

          context.font = "600 11px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif";
          context.fillStyle = `rgba(226, 234, 255, ${0.12 + proximity * 0.56})`;
          context.textAlign = position.x < centerX ? "right" : "left";
          context.fillText(position.label, position.x + (position.x < centerX ? -10 : 10), position.y + 4);
        });
        context.restore();
      }

      function draw(time) {
        drawStarfield(time);
        drawSatellites(time);
        animationFrame = window.requestAnimationFrame(draw);
      }

      resize();
      if (reduceMotion) {
        drawStarfield(0);
        drawSatellites(0);
        return;
      }
      animationFrame = window.requestAnimationFrame(draw);

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && animationFrame) {
          window.cancelAnimationFrame(animationFrame);
          animationFrame = null;
        } else if (!document.hidden && !animationFrame) {
          animationFrame = window.requestAnimationFrame(draw);
        }
      });
    }

    function syncSearchText() {
      const value = search.value;
      const selectionEnd = search.selectionEnd ?? value.length;
      const changedByAppend = value.length > previousSearchValue.length
        && value.startsWith(previousSearchValue);

      searchLabel.dataset.empty = value === "" ? "true" : "false";
      searchText.innerHTML = [...value].map((character, index) => {
        const shouldAnimate = changedByAppend && index >= previousSearchValue.length && !reduceMotion;
        return `<span class="typed-char${shouldAnimate ? " is-new" : ""}">${escapeHtml(character)}</span>`;
      }).join("");

      searchMeasure.textContent = value.slice(0, selectionEnd);
      const style = window.getComputedStyle(searchLabel);
      const padding = Number.parseFloat(style.getPropertyValue("--pad-x")) || 30;
      const maxCursor = Math.max(0, searchLabel.clientWidth - (padding * 2) - 8);
      const cursorX = Math.min(searchMeasure.offsetWidth, maxCursor);
      searchLabel.style.setProperty("--cursor-x", `${cursorX}px`);
      previousSearchValue = value;
    }

    function render() {
      list.innerHTML = "";

      tools.forEach(tool => {
        const item = document.createElement("li");
        item.className = "tool";
        item.dataset.url = tool.url;
        item.dataset.name = tool.name;
        item.innerHTML = `<a href="${tool.url}">${tool.name}</a>`;
        list.appendChild(item);
      });

      secrets.forEach(secret => {
        const item = document.createElement("li");
        item.className = "tool";
        item.dataset.secret = secret.trigger;
        item.style.display = "none";
        item.innerHTML = `<div class="secret" aria-disabled="true">${secret.name}</div>`;
        list.appendChild(item);
      });
    }

    function setOpenState(hasResults) {
      const shouldOpen = document.activeElement === search || normalize(search.value) !== "";
      list.dataset.open = shouldOpen && hasResults ? "true" : "false";
      empty.style.display = shouldOpen && !hasResults ? "block" : "none";
    }

    function filter() {
      syncSearchText();
      const query = normalize(search.value);
      let shown = 0;

      tools.forEach(tool => {
        const item = list.querySelector(`[data-url="${tool.url}"]`);
        const show = matchesTool(tool, query);
        item.style.display = show ? "block" : "none";
        if (show) shown++;
      });

      secrets.forEach(secret => {
        const item = list.querySelector(`[data-secret="${secret.trigger}"]`);
        const show = query === secret.trigger;
        item.style.display = show ? "block" : "none";
        if (show) shown++;
      });

      setOpenState(shown > 0);
    }

    search.addEventListener("focus", filter);
    search.addEventListener("input", filter);
    search.addEventListener("click", syncSearchText);
    search.addEventListener("keyup", syncSearchText);
    search.addEventListener("select", syncSearchText);
    search.addEventListener("blur", () => {
      window.setTimeout(filter, 100);
    });
    search.addEventListener("keydown", event => {
      if (event.key !== "Enter") return;
      const query = normalize(search.value);
      if (secrets.some(secret => secret.trigger === query)) return;

      const first = visibleResults()[0];
      if (first) window.location.href = first.dataset.url;
    });

    render();
    filter();
    setupSpaceBackground();

    function setupHeadingAnimation() {
      const nameCycle = document.getElementById("name-cycle");
      if (!nameCycle || reduceMotion) return;

      const namePieces = ["D", "a", "n", "y", "l", "o", "'s"];
      const nameText = namePieces.join("");
      const fonts = [
        "\"Arial Black\", system-ui, sans-serif",
        "\"Bahnschrift Condensed\", \"Arial Narrow\", system-ui, sans-serif",
        "\"Brush Script MT\", \"Segoe Script\", cursive",
        "Cambria, Georgia, serif",
        "\"Century Gothic\", Futura, system-ui, sans-serif",
        "Consolas, \"Lucida Console\", monospace",
        "Constantia, Palatino, serif",
        "Georgia, \"Times New Roman\", serif",
        "Garamond, Georgia, serif",
        "\"Franklin Gothic Heavy\", Impact, system-ui, sans-serif",
        "\"Lucida Handwriting\", \"Segoe Script\", cursive",
        "\"Lucida Sans Typewriter\", \"Courier New\", monospace",
        "Perpetua, Garamond, serif",
        "Rockwell, \"Courier New\", serif",
        "\"Segoe UI Black\", system-ui, sans-serif",
        "\"Segoe UI Light\", system-ui, sans-serif",
        "\"Times New Roman\", Times, serif",
        "\"Trebuchet MS\", system-ui, sans-serif",
        "\"Courier New\", monospace",
        "Impact, Haettenschweiler, sans-serif",
        "Verdana, system-ui, sans-serif"
      ];
      const weights = [780, 690, 740, 760, 720, 760, 730, 720, 760, 800, 720, 760, 740, 760, 850, 380, 760, 820, 760, 800, 760];
      const stableFont = "ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif";
      const stableWeight = 780;
      const measure = document.createElement("span");
      measure.textContent = nameText;
      measure.setAttribute("aria-hidden", "true");
      measure.style.position = "fixed";
      measure.style.left = "-9999px";
      measure.style.top = "-9999px";
      measure.style.visibility = "hidden";
      measure.style.whiteSpace = "nowrap";
      measure.style.pointerEvents = "none";
      document.body.appendChild(measure);

      function syncMeasureBase() {
        const titleStyle = window.getComputedStyle(nameCycle.closest("h1"));
        measure.style.fontSize = titleStyle.fontSize;
        measure.style.lineHeight = titleStyle.lineHeight;
        measure.style.letterSpacing = titleStyle.letterSpacing;
      }

      function measureName(font, weight) {
        syncMeasureBase();
        measure.style.fontFamily = font;
        measure.style.fontWeight = weight;
        return measure.getBoundingClientRect().width || 1;
      }

      let stableWidth = measureName(stableFont, stableWeight);
      nameCycle.style.width = `${stableWidth}px`;
      nameCycle.style.height = `${measure.getBoundingClientRect().height || 0}px`;
      nameCycle.style.verticalAlign = "top";

      function fitName(font, weight) {
        const currentWidth = measureName(font, weight);
        const scale = Math.min(1.24, Math.max(0.66, stableWidth / currentWidth));
        nameCycle.style.setProperty("--name-scale", scale);
      }

      window.addEventListener("resize", () => {
        stableWidth = measureName(stableFont, stableWeight);
        nameCycle.style.width = `${stableWidth}px`;
        nameCycle.style.height = `${measure.getBoundingClientRect().height || 0}px`;
        fitName(currentFont, currentWeight);
      });

      const visual = document.createElement("span");
      visual.className = "name-visual";
      visual.setAttribute("aria-hidden", "true");
      const letters = namePieces.map((letter, index) => {
        const span = document.createElement("span");
        span.className = "name-letter";
        span.textContent = letter;
        span.setAttribute("aria-hidden", "true");
        span.dataset.index = index;
        return span;
      });

      nameCycle.textContent = "";
      letters.forEach(letter => visual.appendChild(letter));
      nameCycle.appendChild(visual);

      const start = performance.now();
      const freezeStart = 2000;
      const freezeDuration = 2000;
      const freezeGap = freezeDuration / Math.max(letters.length - 1, 1);
      let lastFontStep = -1;
      let currentFont = fonts[0];
      let currentWeight = weights[0];

      function pickFont(step) {
        let nextIndex = Math.floor(Math.random() * fonts.length);
        if (fonts.length > 1 && fonts[nextIndex] === currentFont) {
          nextIndex = (nextIndex + 1) % fonts.length;
        }

        currentFont = fonts[nextIndex];
        currentWeight = weights[nextIndex];
        lastFontStep = step;
        fitName(currentFont, currentWeight);
      }

      function tick(now) {
        const elapsed = now - start;
        const fontStep = Math.floor(elapsed / 48);
        if (fontStep !== lastFontStep) pickFont(fontStep);

        let allStable = true;
        letters.forEach((letter, index) => {
          const shouldFreeze = elapsed >= freezeStart + (index * freezeGap);

          if (shouldFreeze) {
            if (!letter.classList.contains("is-stable")) {
              letter.classList.add("is-stable");
              letter.style.fontFamily = stableFont;
              letter.style.fontWeight = stableWeight;
              letter.style.opacity = "1";
              if (index === letters.length - 1) {
                nameCycle.style.setProperty("--name-scale", 1);
              }
            }
            return;
          }

          allStable = false;
          letter.style.fontFamily = currentFont;
          letter.style.fontWeight = currentWeight;
          letter.style.opacity = "1";
          letter.style.setProperty("--letter-y", "0");
        });

        if (!allStable) requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }

    setupHeadingAnimation();
  </script>
</body>
</html>

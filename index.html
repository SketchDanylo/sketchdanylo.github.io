<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danylo's Helping Tools</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #191919;
      --panel: #222;
      --panel-soft: #2d2d2d;
      --panel-hover: #363636;
      --text: #f2f2f2;
      --muted: #8f8f8f;
      --line: #333;
      --focus: #b9d6ff;
      --secret: #d8c17a;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 34rem),
        var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      width: min(620px, 100%);
    }

    .panel {
      padding: clamp(20px, 4vw, 30px);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 6px);
      background: rgba(34, 34, 34, 0.96);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(2.1rem, 7vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0.08em;
      text-align: center;
    }

    label {
      display: block;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #search {
      width: 100%;
      min-height: 54px;
      margin-bottom: 16px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      outline: none;
      color: var(--text);
      background: #3a3a3a;
      font: inherit;
      font-size: 1.08rem;
    }

    #search::placeholder {
      color: #858585;
    }

    #search:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(185, 214, 255, 0.13);
    }

    .tools {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tool {
      display: block;
    }

    .tool a,
    .secret {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 54px;
      padding: 0 16px;
      border-radius: 10px;
      color: var(--text);
      background: var(--panel-soft);
      text-decoration: none;
      font-size: 1.08rem;
      font-weight: 650;
      transition: background 140ms ease, transform 140ms ease;
    }

    .tool a:hover,
    .tool a:focus-visible {
      background: var(--panel-hover);
      transform: translateY(-1px);
    }

    .tool a:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    .tool a::after {
      content: "→";
      color: var(--muted);
      font-weight: 500;
      opacity: 0;
      transform: translateX(-5px);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .tool a:hover::after,
    .tool a:focus-visible::after {
      opacity: 1;
      transform: translateX(0);
    }

    .secret {
      color: var(--secret);
      cursor: default;
    }

    .empty {
      display: none;
      margin-top: 14px;
      color: var(--muted);
      text-align: center;
      font-size: 0.98rem;
    }

    .small-note {
      margin-top: 14px;
      color: var(--muted);
      text-align: center;
      font-size: 0.82rem;
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
        place-items: start center;
      }

      h1 {
        text-align: left;
        letter-spacing: 0.04em;
      }

      .panel {
        padding: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel" aria-label="Tool search">
      <h1>Danylo's Helping Tools</h1>

      <label>
        <span class="sr-only">Search tools</span>
        <input id="search" type="search" autocomplete="off" placeholder="Ask AI to open something">
      </label>

      <ul class="tools" id="tools"></ul>
      <p class="empty" id="empty">Couldn’t find that tool.</p>
      <p class="small-note">Press Enter to open the first result.</p>
    </section>
  </main>

  <script>
    const tools = [
      {
        name: "Graph Calculator",
        url: "/graph",
        keywords: ["graph", "calculator", "math", "plot", "points", "graf"]
      },
      {
        name: "Drip Funnel Helper",
        url: "/drop",
        keywords: ["drip", "drop", "funnel", "timer", "trichter", "tropf"]
      },
      {
        name: "Orbital Model Drawer",
        url: "/orbital",
        keywords: ["orbital", "model", "atom", "quantum", "electron"]
      },
      {
        name: "Nomenclature Engine",
        url: "/nomenclature",
        keywords: ["nomenclature", "iupac", "organic", "chemistry", "bonds"]
      },
      {
        name: "Periodic Memo",
        url: "/periodicgame",
        keywords: ["periodic", "memo", "game", "elements", "chemistry"]
      },
      {
        name: "pH Predict",
        url: "/phpredictor",
        keywords: ["ph", "predict", "predictor", "acid", "base"]
      }
    ];

    const secrets = [
      {
        name: "It was a long time ago...",
        trigger: "lsd"
      }
    ];

    const search = document.getElementById("search");
    const list = document.getElementById("tools");
    const empty = document.getElementById("empty");

    function normalize(value) {
      return value.toLowerCase().trim();
    }

    function matchesTool(tool, query) {
      if (!query) return true;
      const haystack = [tool.name, ...tool.keywords].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function visibleResults() {
      return [...list.querySelectorAll("[data-url]")]
        .filter(item => item.style.display !== "none");
    }

    function render() {
      list.innerHTML = "";

      tools.forEach(tool => {
        const item = document.createElement("li");
        item.className = "tool";
        item.dataset.url = tool.url;
        item.dataset.name = tool.name;
        item.innerHTML = `<a href="${tool.url}">${tool.name}</a>`;
        list.appendChild(item);
      });

      secrets.forEach(secret => {
        const item = document.createElement("li");
        item.className = "tool";
        item.dataset.secret = secret.trigger;
        item.style.display = "none";
        item.innerHTML = `<div class="secret" aria-disabled="true">${secret.name}</div>`;
        list.appendChild(item);
      });
    }

    function filter() {
      const query = normalize(search.value);
      let shown = 0;

      tools.forEach(tool => {
        const item = list.querySelector(`[data-url="${tool.url}"]`);
        const show = matchesTool(tool, query);
        item.style.display = show ? "block" : "none";
        if (show) shown++;
      });

      secrets.forEach(secret => {
        const item = list.querySelector(`[data-secret="${secret.trigger}"]`);
        const show = query === secret.trigger;
        item.style.display = show ? "block" : "none";
        if (show) shown++;
      });

      empty.style.display = shown === 0 ? "block" : "none";
    }

    search.addEventListener("input", filter);
    search.addEventListener("keydown", event => {
      if (event.key !== "Enter") return;
      const query = normalize(search.value);
      if (secrets.some(secret => secret.trigger === query)) return;

      const first = visibleResults()[0];
      if (first) window.location.href = first.dataset.url;
    });

    render();
    filter();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#0b1020"/>
<title>Nomenclature Studio — IUPAC Naming Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10; --surface:#111318; --surface-2:#171a21; --surface-3:#1e222b;
  --border:#242833; --border-soft:#1a1d25;
  --text:#e7e9ee; --text-dim:#8891a0; --text-faint:#565d6b;
  --accent:#5b8cf0; --accent-ink:#0a1020; --accent-dim:rgba(91,140,240,.14); --accent-brd:rgba(91,140,240,.4);
  --good:#3fb968; --good-dim:rgba(63,185,104,.12);
  --bad:#e5534b; --bad-dim:rgba(229,83,75,.12);
  --warn:#cf9a2e; --warn-dim:rgba(207,154,46,.12);
  --r:10px; --r-lg:14px;
  --shadow:0 16px 40px rgba(0,0,0,.5);
  --rail-size:64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);
  height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
button{font-family:inherit}
svg.ico{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block}

/* ---------- header ---------- */
header.topbar{
  flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;
  height:54px;padding:0 14px;border-bottom:1px solid var(--border-soft);background:var(--surface);
}
.brand{display:flex;align-items:center;gap:9px;min-width:0}
.brand .mark{
  width:26px;height:26px;flex:none;border-radius:7px;display:grid;place-items:center;
  background:var(--accent);color:var(--accent-ink);font-weight:800;font-size:13px;letter-spacing:-.5px;
}
.brand h1{font-size:.92rem;font-weight:600;letter-spacing:.1px;white-space:nowrap;color:var(--text)}
.name-cta{
  display:flex;align-items:center;gap:7px;border:1px solid var(--accent-brd);background:var(--accent-dim);color:var(--text);
  padding:0 16px;height:34px;border-radius:8px;font:600 .82rem 'Inter';cursor:pointer;transition:background .15s,border-color .15s;
}
.name-cta:hover{background:rgba(91,140,240,.22)}
.name-cta:active{transform:translateY(1px)}
.name-cta svg{color:var(--accent)}

/* ---------- stage: rail + canvas ---------- */
.stage{flex:1;display:flex;min-height:0;position:relative}
.rail{
  flex:none;width:var(--rail-size);background:var(--surface);border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;overflow-y:auto;
}
.rail .sep{width:32px;height:1px;background:var(--border);margin:6px 0;flex:none}
.rbtn{
  width:44px;height:44px;border-radius:9px;border:1px solid transparent;background:transparent;color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.13s;position:relative;flex:none;
}
.rbtn:hover{background:var(--surface-3);color:var(--text)}
.rbtn:active{transform:scale(.93)}
.rbtn.active{background:var(--accent-dim);border-color:var(--accent-brd);color:var(--accent)}
.rbtn.danger:hover{background:var(--bad-dim);color:var(--bad)}
.rbtn[disabled]{opacity:.32;pointer-events:none}
.el-swatch{
  width:38px;height:38px;border-radius:9px;border:1px solid transparent;background:transparent;
  display:flex;align-items:center;justify-content:center;font:700 .82rem 'Inter';cursor:pointer;transition:.13s;flex:none;
}
.el-swatch:hover{background:var(--surface-3)}
.el-swatch.active{background:currentColor;box-shadow:0 0 0 1px currentColor}
.el-swatch.active span{color:var(--bg);mix-blend-mode:normal;filter:none}
.el-swatch span{color:inherit}

/* ---------- canvas ---------- */
.canvas-area{flex:1;position:relative;overflow:hidden;background:
    linear-gradient(var(--border-soft) 1px,transparent 1px),
    linear-gradient(90deg,var(--border-soft) 1px,transparent 1px),var(--bg);
  background-size:24px 24px,24px 24px,100% 100%;
}
#molCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair}
.canvas-hint{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  color:var(--text-faint);font-size:.82rem;text-align:center;pointer-events:none;line-height:1.8;max-width:280px;
}
.canvas-hint b{color:var(--text-dim);font-weight:600}
.formula-badge{
  position:absolute;top:12px;left:12px;pointer-events:none;
  font:600 .82rem/1 'Inter';color:var(--text-dim);letter-spacing:.2px;
  background:var(--surface);padding:7px 11px;border-radius:8px;border:1px solid var(--border-soft);display:none;
}
.formula-badge b{color:var(--text);font-weight:700}
.zoom-ui{position:absolute;right:12px;bottom:12px;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border-soft);border-radius:9px;overflow:hidden}
.zoom-ui button{width:36px;height:34px;border:none;border-bottom:1px solid var(--border-soft);background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center}
.zoom-ui button:last-child{border-bottom:none}
.zoom-ui button:hover{background:var(--surface-3);color:var(--text)}
.zoom-ui button:active{transform:scale(.92)}

/* floating context popover for a selected atom/bond */
.ctx-pop{
  position:absolute;transform:translate(-50%,calc(-100% - 12px));display:none;
  align-items:center;gap:2px;padding:5px;border-radius:9px;
  background:var(--surface-2);border:1px solid var(--border);box-shadow:var(--shadow);z-index:20;
}
.ctx-pop.show{display:flex}
.ctx-pop button{
  height:32px;min-width:32px;padding:0 9px;border:none;border-radius:6px;background:transparent;color:var(--text);
  font:600 .82rem 'Inter';cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;
}
.ctx-pop button:hover{background:var(--surface-3)}
.ctx-pop .charge-val{min-width:20px;text-align:center;color:var(--text-dim);font-weight:700;font-size:.78rem}
.ctx-pop .cp-sep{width:1px;height:20px;background:var(--border);margin:0 3px;flex:none}
.ctx-pop .cp-danger{color:var(--bad)}
.ctx-pop .cp-danger:hover{background:var(--bad-dim)}

/* ---------- results drawer ---------- */
.drawer-veil{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:39;display:none}
.drawer-veil.show{display:block}
.drawer{
  position:fixed;top:54px;right:0;bottom:0;width:380px;max-width:92vw;
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .22s ease;z-index:40;
  display:flex;flex-direction:column;box-shadow:var(--shadow);
}
.drawer.open{transform:translateX(0)}
.drawer-head{flex:none;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border-soft)}
.drawer-head h2{font-size:.82rem;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--text-dim)}
.drawer-close{width:28px;height:28px;border:none;border-radius:7px;background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center}
.drawer-close:hover{background:var(--surface-3);color:var(--text)}
.drawer-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}

.name-card{
  border-radius:var(--r);padding:14px 15px;display:flex;flex-direction:column;gap:9px;
  background:var(--good-dim);border:1px solid rgba(63,185,104,.3);
  animation:pop .2s ease;
}
.name-card.err{background:var(--bad-dim);border-color:rgba(229,83,75,.3)}
.name-card.warn{background:var(--warn-dim);border-color:rgba(207,154,46,.3)}
.name-card .lang-row{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.name-card .lang{flex:none;font:700 .68rem 'Inter';letter-spacing:1px;color:var(--text-dim);width:22px}
.name-card .the-name{font:600 1rem 'Inter';word-break:break-word;color:var(--text)}
.name-card .meta{color:var(--text-dim);font-size:.78rem;line-height:1.5}
.name-card .meta code{background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px;font-size:.75rem}
.name-card .copy{align-self:flex-start;height:30px;padding:0 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface-3);color:var(--text);font:600 .76rem 'Inter';cursor:pointer}
.name-card .copy:hover{background:var(--surface)}
@keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---------- toasts ---------- */
.toast-zone{position:fixed;left:50%;bottom:max(16px,env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;flex-direction:column;gap:7px;z-index:300;pointer-events:none;width:min(92vw,400px)}
.toast{
  background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--warn);
  color:var(--text);padding:10px 14px;border-radius:8px;font:500 .82rem 'Inter';
  box-shadow:var(--shadow);animation:pop .18s ease;
}
.toast.err{border-left-color:var(--bad)} .toast.ok{border-left-color:var(--good)}

/* ---------- periodic table modal ---------- */
.modal-veil{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-veil.show{display:flex}
.pt-modal{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:18px;max-width:900px;width:100%;max-height:86vh;overflow:auto;box-shadow:var(--shadow);
}
.pt-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pt-modal h3{font-size:.92rem;font-weight:700}
.pt-grid{display:grid;grid-template-columns:repeat(18,minmax(32px,1fr));gap:3px;min-width:700px}
.pt-cell{
  aspect-ratio:1;border-radius:6px;border:1px solid var(--border-soft);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  font:700 .74rem 'Inter';color:var(--text);transition:.12s;background:var(--surface-2);
}
.pt-cell small{font:500 .47rem 'Inter';color:var(--text-faint)}
.pt-cell:hover{background:var(--accent-dim);border-color:var(--accent-brd);z-index:2}
.pt-cell:active{transform:scale(.94)}

footer.credit{display:none}
@media (max-width:820px){
  .drawer{top:0;right:0;left:0;bottom:0;width:auto;max-width:none;transform:translateY(100%)}
  .drawer.open{transform:translateY(0)}
}
@media (max-width:720px){
  :root{--rail-size:100%}
  .stage{flex-direction:column}
  .rail{
    width:100%;height:60px;flex-direction:row;border-right:none;border-top:1px solid var(--border-soft);
    order:2;overflow-x:auto;overflow-y:hidden;padding:0 8px;
  }
  .rail .sep{width:1px;height:28px;margin:0 5px}
  .canvas-area{order:1}
  header.topbar{height:48px;padding:0 10px}
  .brand .mark{width:24px;height:24px;font-size:12px}
  .brand h1{font-size:.85rem}
  .name-cta{padding:0 12px;height:32px;font-size:.78rem}
  .name-cta span{display:none}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="mark">N</div>
    <h1>Nomenclature</h1>
  </div>
  <button class="name-cta" id="nameBtn">
    <svg class="ico" viewBox="0 0 24 24"><path d="M9 3h6M10 3v5.2L4.6 17.5A2 2 0 0 0 6.4 20.5h11.2a2 2 0 0 0 1.8-3L14 8.2V3"/><path d="M8 14h8"/></svg>
    <span>Name it</span>
  </button>
</header>

<div class="stage">
  <nav class="rail" id="rail">
    <button class="el-swatch active" data-el="C" style="color:#d9d4b6"><span>C</span></button>
    <button class="el-swatch" data-el="H" style="color:#e5edf7"><span>H</span></button>
    <button class="el-swatch" data-el="O" style="color:#f87171"><span>O</span></button>
    <button class="el-swatch" data-el="N" style="color:#5b9bf8"><span>N</span></button>
    <button class="el-swatch" data-el="S" style="color:#facc15"><span>S</span></button>
    <button class="el-swatch" data-el="Cl" style="color:#34d399"><span>Cl</span></button>
    <button class="rbtn" id="ptBtn" title="More elements">
      <svg class="ico" viewBox="0 0 24 24"><circle cx="6" cy="6" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="6" r="1.4" fill="currentColor" stroke="none"/><circle cx="18" cy="6" r="1.4" fill="currentColor" stroke="none"/><circle cx="6" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="18" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="6" cy="18" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="1.4" fill="currentColor" stroke="none"/><circle cx="18" cy="18" r="1.4" fill="currentColor" stroke="none"/></svg>
    </button>
    <div class="sep"></div>
    <button class="rbtn" data-bond="1" title="Single bond"><svg class="ico" viewBox="0 0 24 24"><line x1="4" y1="12" x2="20" y2="12"/></svg></button>
    <button class="rbtn" data-bond="2" title="Double bond"><svg class="ico" viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/></svg></button>
    <button class="rbtn" data-bond="3" title="Triple bond"><svg class="ico" viewBox="0 0 24 24"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg></button>
    <div class="sep"></div>
    <button class="rbtn" id="moveBtn" title="Move atoms (drag to reposition instead of bonding)">
      <svg class="ico" viewBox="0 0 24 24"><path d="M4 3l7 18 2.5-7.5L21 11z"/></svg>
    </button>
    <button class="rbtn" id="autoHBtn" title="Auto-fill hydrogens">
      <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.1"/><ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(30 12 12)"/><ellipse cx="12" cy="12" rx="9" ry="3.6" transform="rotate(-30 12 12)"/></svg>
    </button>
    <button class="rbtn" id="cleanBtn" title="Tidy layout">
      <svg class="ico" viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>
    </button>
    <div class="sep"></div>
    <button class="rbtn" id="undoBtn" title="Undo"><svg class="ico" viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h10a6 6 0 016 6v1"/></svg></button>
    <button class="rbtn" id="redoBtn" title="Redo"><svg class="ico" viewBox="0 0 24 24"><path d="M15 14l5-5-5-5"/><path d="M20 9H10a6 6 0 00-6 6v1"/></svg></button>
    <button class="rbtn danger" id="clearBtn" title="Clear all"><svg class="ico" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2m-9 0l1 14h8l1-14"/></svg></button>
  </nav>

  <div class="canvas-area" id="canvasWrap">
    <canvas id="molCanvas"></canvas>
    <div class="canvas-hint" id="canvasHint">
      <b>Click</b> empty space to place an atom<br/>
      <b>Drag</b> from an atom to bond it to another<br/>
      <b>Click</b> an atom to retype it · <b>click</b> a bond to change its order
    </div>
    <div class="formula-badge" id="formulaBadge"></div>
    <div class="zoom-ui">
      <button id="zoomIn" title="Zoom in"><svg class="ico" viewBox="0 0 24 24" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <button id="zoomOut" title="Zoom out"><svg class="ico" viewBox="0 0 24 24" style="width:16px;height:16px"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <button id="zoomFit" title="Fit to view"><svg class="ico" viewBox="0 0 24 24" style="width:15px;height:15px"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg></button>
    </div>
    <div class="ctx-pop" id="ctxPop">
      <button id="cpMinus" title="Decrease charge">−</button>
      <span class="charge-val" id="cpCharge">0</span>
      <button id="cpPlus" title="Increase charge">+</button>
      <span class="cp-sep" id="cpSep"></span>
      <button class="cp-danger" id="cpDelete" title="Delete">
        <svg class="ico" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M3 6h18M8 6V4h8v2m-9 0l1 14h8l1-14"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="drawer-veil" id="drawerVeil"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2>Naming</h2>
    <button class="drawer-close" id="drawerClose">
      <svg class="ico" viewBox="0 0 24 24" style="width:16px;height:16px"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="resultsBody"></div>
</div>

<div class="modal-veil" id="ptVeil">
  <div class="pt-modal">
    <div class="pt-modal-head">
      <h3>Periodic table</h3>
      <button class="drawer-close" id="ptClose">
        <svg class="ico" viewBox="0 0 24 24" style="width:16px;height:16px"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
      </button>
    </div>
    <div class="pt-grid" id="ptGrid"></div>
  </div>
</div>
<div class="toast-zone" id="toastZone"></div>

<script>

const VALENCE = {H:[1],He:[0],Li:[1],Be:[2],B:[3],C:[4],N:[3],O:[2],F:[1],Ne:[0],
Na:[1],Mg:[2],Al:[3],Si:[4],P:[3,5],S:[2,4,6],Cl:[1,3,5,7],Ar:[0],K:[1],Ca:[2],
Ga:[3],Ge:[4],As:[3,5],Se:[2,4,6],Br:[1,3,5],Kr:[0,2],Rb:[1],Sr:[2],In:[3],Sn:[2,4],
Sb:[3,5],Te:[2,4,6],I:[1,3,5,7],Xe:[0,2,4,6],Cs:[1],Ba:[2],Tl:[1,3],Pb:[2,4],Bi:[3,5],Po:[2,4],At:[1],Rn:[0],Fr:[1],Ra:[2]};
const MAX_BONDS_DEFAULT = 6; // transition metals & friends: relaxed
const CPK = {H:"#e5edf7",C:"#d9d4b6",N:"#5b9bf8",O:"#f87171",S:"#facc15",P:"#fb923c",
F:"#4ade80",Cl:"#34d399",Br:"#d97706",I:"#a78bfa",B:"#fda4af",Si:"#94a3b8",
Na:"#c084fc",K:"#c084fc",Li:"#c084fc",Mg:"#86efac",Ca:"#86efac",Fe:"#f97316",Cu:"#fb7185",Zn:"#93c5fd"};
const elColor = s => CPK[s] || "#9fb0c8";
// atoms that can carry + when over-bonded / − when under-bonded
const CATION_OK = {N:1,O:1,S:1,P:1,B:-1}; // B gets − (borate style)

/* ================= STATE ================= */
let atoms = [];   // {el,x,y,charge}
let bonds = [];   // {a,b,order}
let mode = "build";        // build | move
let drawEl = "C";
let bondOrder = 1;
let selAtom = -1, selBond = -1;
let view = {x:0,y:0,k:1};
const hist = [], redoS = [];
const $ = id => document.getElementById(id);
const canvas = $("molCanvas"), wrap = $("canvasWrap");
const ctx = canvas.getContext("2d");

function snap(){ hist.push(JSON.stringify({atoms,bonds})); if(hist.length>200) hist.shift(); redoS.length=0; }
function restore(s){ const o=JSON.parse(s); atoms=o.atoms; bonds=o.bonds; selAtom=selBond=-1; hidePopover(); afterChange(); }
function undo(){ if(hist.length>1){ redoS.push(hist.pop()); restore(hist[hist.length-1]); } }
function redo(){ if(redoS.length){ const s=redoS.pop(); hist.push(s); restore(s); } }

function toast(msg,cls){ const t=document.createElement("div"); t.className="toast "+(cls||""); t.textContent=msg;
  $("toastZone").appendChild(t); setTimeout(()=>{t.style.opacity="0"; t.style.transition="opacity .3s"; setTimeout(()=>t.remove(),320);},2400); }

/* ================= VALENCE / CHARGES ================= */
function bondSum(i){ let s=0; for(const b of bonds) if(b.a===i||b.b===i) s+=b.order; return s; }
function maxValence(el){ const v=VALENCE[el]; return v? Math.max(...v) : MAX_BONDS_DEFAULT; }
function canAddBond(i,extra){
  const el=atoms[i].el, s=bondSum(i)+extra, mx=maxValence(el);
  if(s<=mx) return {ok:true,charge:null};
  if(CATION_OK[el]!==undefined && s===mx+1) return {ok:true,charge:CATION_OK[el]};
  return {ok:false};
}
// recompute automatic charges (only touches atoms whose charge was auto-managed)
function autoCharges(){
  for(let i=0;i<atoms.length;i++){
    const a=atoms[i]; if(a.manualCharge) continue;
    const mx=maxValence(a.el), s=bondSum(i);
    if(CATION_OK[a.el]!==undefined && s===mx+1) a.charge=CATION_OK[a.el];
    else if(a.charge && s<=mx) a.charge=0;
  }
}
function implicitH(i){
  const a=atoms[i]; if(a.el==="H") return 0;
  const v=VALENCE[a.el]; if(!v) return 0;
  const s=bondSum(i);
  // charge adjusts target valence: N+ ->4, O- ->1, etc.
  for(const base of v){
    let target=base;
    if(a.charge>0 && CATION_OK[a.el]>0) target=base+a.charge;      // N+ -> 4 bonds
    else if(a.charge<0) target=Math.max(0,base+a.charge);          // O- -> 1 bond
    if(target>=s) return target-s;
  }
  return 0;
}

/* ================= VIEW / RENDER ================= */
function resizeCanvas(){
  const r=wrap.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  if(r.width<1||r.height<1) return;
  canvas.width=r.width*dpr; canvas.height=r.height*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  redraw();
}
new ResizeObserver(resizeCanvas).observe(wrap);
window.addEventListener("resize",resizeCanvas);
window.addEventListener("orientationchange",()=>setTimeout(resizeCanvas,60));
const W2S = p => ({x:(p.x+view.x)*view.k, y:(p.y+view.y)*view.k});
const S2W = p => ({x:p.x/view.k-view.x, y:p.y/view.k-view.y});
const R_ATOM = 17;

function drawBondLine(x1,y1,x2,y2,order,color,width){
  const dx=x2-x1, dy=y2-y1, L=Math.hypot(dx,dy)||1;
  const ox=-dy/L, oy=dx/L, gap=4.2*view.k;
  ctx.strokeStyle=color; ctx.lineWidth=width;
  const lines = order===1?[0]: order===2?[-gap/1.6,gap/1.6]:[-gap,0,gap];
  for(const off of lines){
    ctx.beginPath();
    ctx.moveTo(x1+ox*off, y1+oy*off);
    ctx.lineTo(x2+ox*off, y2+oy*off);
    ctx.stroke();
  }
}
function redraw(){
  const r=wrap.getBoundingClientRect();
  ctx.clearRect(0,0,r.width,r.height);
  $("canvasHint").style.display = atoms.length? "none":"block";
  // bonds
  bonds.forEach((b,bi)=>{
    const A=W2S(atoms[b.a]), B=W2S(atoms[b.b]);
    const sel = bi===selBond;
    drawBondLine(A.x,A.y,B.x,B.y,b.order, sel?"#5b8cf0":"rgba(231,233,238,.68)", (sel?3:2)*Math.min(view.k,1.4));
  });
  // temp bond while dragging
  if(drag.kind==="growBond"){
    const A=W2S(atoms[drag.from]);
    ctx.setLineDash([6,5]);
    drawBondLine(A.x,A.y,drag.sx,drag.sy, bondOrder, "rgba(91,140,240,.85)",2);
    ctx.setLineDash([]);
  }
  // atoms
  const fs=Math.max(11,14*view.k);
  atoms.forEach((a,i)=>{
    const P=W2S(a), rr=R_ATOM*view.k;
    const col=elColor(a.el);
    ctx.beginPath(); ctx.arc(P.x,P.y,rr,0,7);
    ctx.fillStyle="#0a0c10"; ctx.fill();
    ctx.lineWidth = i===selAtom? 2.6:1.5;
    ctx.strokeStyle = i===selAtom? "#5b8cf0": col; ctx.stroke();
    ctx.fillStyle=col; ctx.font=`700 ${fs}px Inter`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(a.el,P.x,P.y+1);
    // implicit H count (small)
    const ih=implicitH(i);
    if(ih>0 && a.el!=="C"){
      ctx.font=`600 ${fs*0.62}px Inter`; ctx.fillStyle="rgba(231,233,238,.5)";
      ctx.fillText("H"+(ih>1?ih:""),P.x,P.y+rr+8*view.k);
    }
    // charge badge
    if(a.charge){
      ctx.beginPath(); ctx.arc(P.x+rr*.85,P.y-rr*.85,7*Math.min(view.k,1.2),0,7);
      ctx.fillStyle=a.charge>0? "#e5534b":"#5b8cf0"; ctx.fill();
      ctx.fillStyle="#0a0c10"; ctx.font=`800 ${fs*0.68}px Inter`;
      ctx.fillText(a.charge>0? (a.charge>1?a.charge+"+":"+") : (a.charge<-1?(-a.charge)+"−":"−"), P.x+rr*.85, P.y-rr*.85+0.5);
    }
  });
  updateFormula();
  positionPopover();
}
function afterChange(){ autoCharges(); redraw(); }

/* ================= HIT TESTS ================= */
function hitAtom(sx,sy){
  for(let i=atoms.length-1;i>=0;i--){
    const P=W2S(atoms[i]);
    if((P.x-sx)**2+(P.y-sy)**2 < (R_ATOM*view.k+10)**2) return i;
  }
  return -1;
}
function hitBond(sx,sy){
  for(let i=bonds.length-1;i>=0;i--){
    const A=W2S(atoms[bonds[i].a]), B=W2S(atoms[bonds[i].b]);
    const L2=(B.x-A.x)**2+(B.y-A.y)**2; if(!L2) continue;
    let t=((sx-A.x)*(B.x-A.x)+(sy-A.y)*(B.y-A.y))/L2; t=Math.max(0,Math.min(1,t));
    const px=A.x+t*(B.x-A.x), py=A.y+t*(B.y-A.y);
    if((px-sx)**2+(py-sy)**2 < 121) return i;
  }
  return -1;
}

/* =================================================================
   POINTER INPUT — one unified surface, no tool-switching required:
     · click empty canvas          -> place atom (current element)
     · drag from an atom           -> grow a bond (current bond order)
     · click an atom (no drag)     -> retype it + open charge/delete popover
     · click a bond                -> cycle its order + open delete popover
     · drag empty canvas           -> pan
     · "Move" mode (rail toggle)   -> dragging an atom repositions it instead
     · mouse wheel / pinch         -> zoom
   ================================================================= */
const drag={kind:null,from:-1,bond:-1,sx:0,sy:0,moved:false,startView:null};
const pointers=new Map();
let pinch0=null;
const THRESH=6;

canvas.addEventListener("pointerdown",e=>{
  canvas.setPointerCapture(e.pointerId);
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left, sy=e.clientY-rect.top;
  pointers.set(e.pointerId,{sx,sy});
  if(pointers.size===2){
    const ps=[...pointers.values()];
    pinch0={d:Math.hypot(ps[0].sx-ps[1].sx,ps[0].sy-ps[1].sy),
            cx:(ps[0].sx+ps[1].sx)/2, cy:(ps[0].sy+ps[1].sy)/2,
            view:{...view}};
    drag.kind="pinch"; return;
  }
  drag.moved=false; drag.sx=sx; drag.sy=sy; drag.panSX=sx; drag.panSY=sy; drag.startView={...view};
  const ai=hitAtom(sx,sy);
  if(ai>=0){
    drag.from=ai;
    drag.kind = mode==="move" ? "moveAtom" : "growBond";
    return;
  }
  const bi=hitBond(sx,sy);
  if(bi>=0){ drag.kind="bondHit"; drag.bond=bi; return; }
  drag.kind="empty";
});
canvas.addEventListener("pointermove",e=>{
  if(!pointers.has(e.pointerId)) return;
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left, sy=e.clientY-rect.top;
  const p=pointers.get(e.pointerId); p.sx=sx; p.sy=sy;
  if(drag.kind==="pinch" && pointers.size===2){
    const ps=[...pointers.values()];
    const d=Math.hypot(ps[0].sx-ps[1].sx,ps[0].sy-ps[1].sy);
    const cx=(ps[0].sx+ps[1].sx)/2, cy=(ps[0].sy+ps[1].sy)/2;
    const k=Math.max(.3,Math.min(3,pinch0.view.k*d/pinch0.d));
    view.k=k;
    view.x=cx/k - (pinch0.cx/pinch0.view.k - pinch0.view.x);
    view.y=cy/k - (pinch0.cy/pinch0.view.k - pinch0.view.y);
    redraw(); return;
  }
  if(Math.hypot(sx-drag.sx,sy-drag.sy)>THRESH) drag.moved=true;
  if(drag.kind==="moveAtom"){
    const w=S2W({x:sx,y:sy}); atoms[drag.from].x=w.x; atoms[drag.from].y=w.y; redraw();
  } else if(drag.kind==="growBond"){
    drag.sx=sx; drag.sy=sy; redraw();
  } else if(drag.kind==="empty" && drag.moved){
    view.x=drag.startView.x+(sx-drag.panSX)/view.k;
    view.y=drag.startView.y+(sy-drag.panSY)/view.k;
    redraw();
  }
});
canvas.addEventListener("pointerup",e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left, sy=e.clientY-rect.top;
  pointers.delete(e.pointerId);
  if(drag.kind==="pinch"){ if(pointers.size<2){drag.kind=null; pinch0=null;} return; }
  const kind=drag.kind; drag.kind=null;

  if(kind==="empty"){
    if(!drag.moved){
      hidePopover(); selAtom=selBond=-1;
      const w=S2W({x:sx,y:sy});
      if(mode==="build"){ atoms.push({el:drawEl,x:w.x,y:w.y,charge:0}); snap(); afterChange(); }
      else redraw();
    } else redraw();
  } else if(kind==="moveAtom"){
    if(!drag.moved){ selectAtom(drag.from); }
    else { snap(); redraw(); }
  } else if(kind==="growBond"){
    const ai=hitAtom(sx,sy);
    if(!drag.moved){
      if(atoms[drag.from].el!==drawEl){
        atoms[drag.from].el=drawEl; atoms[drag.from].charge=0; atoms[drag.from].manualCharge=false;
        snap(); afterChange();
      }
      selectAtom(drag.from);
    } else if(ai>=0 && ai!==drag.from){
      tryBond(drag.from,ai,bondOrder);
    } else if(ai<0){
      const chk=canAddBond(drag.from,bondOrder);
      if(!chk.ok){ toast(`${atoms[drag.from].el} can't take another bond (valence full)`,"err"); redraw(); return; }
      const w=S2W({x:sx,y:sy});
      atoms.push({el:drawEl,x:w.x,y:w.y,charge:0});
      const ni=atoms.length-1;
      const chk2=canAddBond(ni,bondOrder);
      if(!chk2.ok){ atoms.pop(); toast(`${drawEl} can't bond here`,"err"); redraw(); return; }
      bonds.push({a:drag.from,b:ni,order:bondOrder});
      if(chk.charge!==null){atoms[drag.from].charge=chk.charge;}
      snap(); afterChange();
    } else redraw();
  } else if(kind==="bondHit" && !drag.moved){
    setBondOrder(drag.bond, bonds[drag.bond].order%3+1);
    selectBond(drag.bond);
  }
});
canvas.addEventListener("pointercancel",e=>{ pointers.delete(e.pointerId); drag.kind=null; });

/* mouse-wheel zoom, centered on cursor */
canvas.addEventListener("wheel",e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left, sy=e.clientY-rect.top;
  const before=S2W({x:sx,y:sy});
  const factor=e.deltaY<0?1.12:1/1.12;
  view.k=Math.max(.3,Math.min(3,view.k*factor));
  const after=W2S(before);
  view.x+=(sx-after.x)/view.k; view.y+=(sy-after.y)/view.k;
  redraw();
},{passive:false});

document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ selAtom=selBond=-1; hidePopover(); redraw(); return; }
  if((e.key==="Delete"||e.key==="Backspace") && (selAtom>=0||selBond>=0)){
    if(document.activeElement && ["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) return;
    e.preventDefault();
    if(selAtom>=0) deleteAtom(selAtom); else { bonds.splice(selBond,1); selBond=-1; hidePopover(); snap(); afterChange(); }
  }
});

function tryBond(i,j,order){
  const ex=bonds.findIndex(b=>(b.a===i&&b.b===j)||(b.a===j&&b.b===i));
  if(ex>=0){ setBondOrder(ex,order); return; }
  const c1=canAddBond(i,order), c2=canAddBond(j,order);
  if(!c1.ok||!c2.ok){
    const bad=!c1.ok? atoms[i].el: atoms[j].el;
    toast(`Impossible bond: ${bad} would exceed its valence`,"err"); redraw(); return;
  }
  bonds.push({a:i,b:j,order});
  if(c1.charge!==null) atoms[i].charge=c1.charge;
  if(c2.charge!==null) atoms[j].charge=c2.charge;
  if(c1.charge||c2.charge) toast("Auto-assigned a formal charge","ok");
  snap(); afterChange();
}
function setBondOrder(bi,order){
  const b=bonds[bi]; if(b.order===order){ redraw(); return; }
  const extra=order-b.order;
  if(extra>0){
    const c1=canAddBond(b.a,extra), c2=canAddBond(b.b,extra);
    if(!c1.ok||!c2.ok){ toast("That bond order would break valence rules","err"); return; }
    if(c1.charge!==null) atoms[b.a].charge=c1.charge;
    if(c2.charge!==null) atoms[b.b].charge=c2.charge;
  }
  b.order=order; snap(); afterChange();
}
function deleteAtom(i){
  bonds=bonds.filter(b=>b.a!==i&&b.b!==i);
  atoms.splice(i,1);
  bonds.forEach(b=>{ if(b.a>i)b.a--; if(b.b>i)b.b--; });
  if(selAtom===i){selAtom=-1;hidePopover();}
  snap(); afterChange();
}

$("zoomIn").onclick=()=>{view.k=Math.min(3,view.k*1.25); redraw();};
$("zoomOut").onclick=()=>{view.k=Math.max(.3,view.k/1.25); redraw();};
$("zoomFit").onclick=fitView;
function fitView(){
  if(!atoms.length){view={x:0,y:0,k:1}; redraw(); return;}
  const r=wrap.getBoundingClientRect();
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  atoms.forEach(a=>{x0=Math.min(x0,a.x);y0=Math.min(y0,a.y);x1=Math.max(x1,a.x);y1=Math.max(y1,a.y);});
  const w=Math.max(120,x1-x0+120), h=Math.max(120,y1-y0+120);
  view.k=Math.max(.3,Math.min(2.2,Math.min(r.width/w,r.height/h)));
  view.x=(r.width/view.k-(x0+x1))/2; view.y=(r.height/view.k-(y0+y1))/2;
  redraw();
}

/* ---- floating context popover for the selected atom/bond ---- */
function selectAtom(i){ selAtom=i; selBond=-1; redraw(); }
function selectBond(bi){ selBond=bi; selAtom=-1; redraw(); }
function hidePopover(){ $("ctxPop").classList.remove("show"); }
function positionPopover(){
  const pop=$("ctxPop");
  if(selAtom<0 && selBond<0){ pop.classList.remove("show"); return; }
  pop.classList.add("show");
  const isAtom=selAtom>=0;
  $("cpMinus").style.display = isAtom? "":"none";
  $("cpCharge").style.display = isAtom? "":"none";
  $("cpPlus").style.display = isAtom? "":"none";
  $("cpSep").style.display = isAtom? "":"none";
  if(isAtom) $("cpCharge").textContent = atoms[selAtom].charge||0;
  let P;
  if(isAtom) P=W2S(atoms[selAtom]);
  else { const b=bonds[selBond]; if(!b){hidePopover();return;} const A=W2S(atoms[b.a]),B=W2S(atoms[b.b]); P={x:(A.x+B.x)/2,y:(A.y+B.y)/2}; }
  pop.style.left=P.x+"px"; pop.style.top=(P.y-(isAtom?R_ATOM*view.k:0))+"px";
}
$("cpPlus").onclick=()=>{ if(selAtom<0)return; atoms[selAtom].charge=(atoms[selAtom].charge||0)+1; atoms[selAtom].manualCharge=true; snap(); redraw(); };
$("cpMinus").onclick=()=>{ if(selAtom<0)return; atoms[selAtom].charge=(atoms[selAtom].charge||0)-1; atoms[selAtom].manualCharge=true; snap(); redraw(); };
$("cpDelete").onclick=()=>{
  if(selAtom>=0) deleteAtom(selAtom);
  else if(selBond>=0){ bonds.splice(selBond,1); selBond=-1; hidePopover(); snap(); afterChange(); }
};
document.addEventListener("pointerdown",e=>{
  if(selAtom<0&&selBond<0) return;
  if($("ctxPop").contains(e.target)||canvas.contains(e.target)) return;
  selAtom=selBond=-1; hidePopover(); redraw();
});

(function buildPT(){
  const grid=$("ptGrid");
  PT.forEach(([sym,z,g,p])=>{
    const c=document.createElement("button");

/* auto-fill hydrogens */
$("autoHBtn").onclick=()=>{
  let added=0;
  const n0=atoms.length;
  for(let i=0;i<n0;i++){
    const need=implicitH(i);
    if(need<=0) continue;
    // neighbors' angles to find open directions
    const angles=[];
    bonds.forEach(b=>{
      if(b.a===i) angles.push(Math.atan2(atoms[b.b].y-atoms[i].y,atoms[b.b].x-atoms[i].x));
      else if(b.b===i) angles.push(Math.atan2(atoms[b.a].y-atoms[i].y,atoms[b.a].x-atoms[i].x));
    });
    for(let k=0;k<need;k++){
      let best=0,bestScore=-1;
      for(let t=0;t<24;t++){
        const ang=t/24*2*Math.PI;
        let score=1e9;
        angles.forEach(a2=>{ let d=Math.abs(((ang-a2)%(2*Math.PI)+3*Math.PI)%(2*Math.PI)-Math.PI); score=Math.min(score,d); });
        if(!angles.length) score=Math.random();
        if(score>bestScore){bestScore=score;best=ang;}
      }
      angles.push(best);
      atoms.push({el:"H",x:atoms[i].x+46*Math.cos(best),y:atoms[i].y+46*Math.sin(best),charge:0});
      bonds.push({a:i,b:atoms.length-1,order:1});
      added++;
    }
  }
  if(added){ snap(); afterChange(); toast(added+" hydrogens added","ok"); }
  else toast("All valences already satisfied");
};

/* tidy layout: simple force relax */
$("cleanBtn").onclick=()=>{
  if(atoms.length<2) return;
  const L=52;
  for(let it=0;it<220;it++){
    const fx=new Array(atoms.length).fill(0), fy=new Array(atoms.length).fill(0);
    bonds.forEach(b=>{
      const dx=atoms[b.b].x-atoms[b.a].x, dy=atoms[b.b].y-atoms[b.a].y;
      const d=Math.hypot(dx,dy)||1, f=(d-L)*0.08;
      fx[b.a]+=dx/d*f; fy[b.a]+=dy/d*f; fx[b.b]-=dx/d*f; fy[b.b]-=dy/d*f;
    });
    for(let i=0;i<atoms.length;i++)for(let j=i+1;j<atoms.length;j++){
      const dx=atoms[j].x-atoms[i].x, dy=atoms[j].y-atoms[i].y;
      const d2=dx*dx+dy*dy||1;
      if(d2<L*L*4){ const d=Math.sqrt(d2), f=Math.min(4,(L*1.7-d)*0.06);
        if(f>0){ fx[i]-=dx/d*f; fy[i]-=dy/d*f; fx[j]+=dx/d*f; fy[j]+=dy/d*f; } }
    }
    atoms.forEach((a,i)=>{a.x+=fx[i];a.y+=fy[i];});
  }
  snap(); fitView(); toast("Layout tidied","ok");
};

/* ================= GRAPH HELPERS + FORMULA ================= */
function adjacency(){
  const adj=atoms.map(()=>[]);
  bonds.forEach((b,bi)=>{ adj[b.a].push({n:b.b,o:b.order,bi}); adj[b.b].push({n:b.a,o:b.order,bi}); });
  return adj;
}
function molFormula(){
  const cnt={};
  atoms.forEach((a,i)=>{ cnt[a.el]=(cnt[a.el]||0)+1; const ih=implicitH(i); if(ih) cnt.H=(cnt.H||0)+ih; });
  const keys=Object.keys(cnt);
  keys.sort((a,b)=>{
    if(a==="C") return -1; if(b==="C") return 1;
    if(a==="H") return cnt.C? -1: a<b?-1:1; if(b==="H") return cnt.C? 1: a<b?-1:1;
    return a<b?-1:1;
  });
  let net=0; atoms.forEach(a=>net+=a.charge||0);
  let s=keys.map(k=>k+(cnt[k]>1?subNum(cnt[k]):"")).join("");
  if(net) s+=" "+(net>0?"⁺":"⁻").repeat(Math.abs(net)>1?0:1)+(Math.abs(net)>1? (Math.abs(net)+(net>0?"+":"−")):"");
  return {str:s,counts:cnt,net};
}
function subNum(n){ const m={0:"₀",1:"₁",2:"₂",3:"₃",4:"₄",5:"₅",6:"₆",7:"₇",8:"₈",9:"₉"}; return String(n).split("").map(d=>m[d]).join(""); }
function updateFormula(){
  const f=$("formulaBadge");
  if(!atoms.length){ f.style.display="none"; return; }
  const m=molFormula();
  f.style.display="block";
  f.innerHTML="<b>"+m.str+"</b>";
}

/* heavy-atom view: explicit H folded into hTotal */
function heavyView(){
  const idxMap=[]; const hv=[]; // hv: {el,charge,h,orig}
  const isH=a=>a.el==="H";
  atoms.forEach((a,i)=>{ if(!isH(a)){ idxMap[i]=hv.length; hv.push({el:a.el,charge:a.charge||0,h:implicitH(i),orig:i,nb:[]}); } else idxMap[i]=-1; });
  // explicit H attach
  bonds.forEach(b=>{
    const A=atoms[b.a],B=atoms[b.b];
    if(A.el==="H"&&B.el==="H") return;
    if(A.el==="H"){ if(idxMap[b.b]>=0) hv[idxMap[b.b]].h++; return; }
    if(B.el==="H"){ if(idxMap[b.a]>=0) hv[idxMap[b.a]].h++; return; }
    const i=idxMap[b.a], j=idxMap[b.b];
    if(i>=0&&j>=0){ hv[i].nb.push({n:j,o:b.order}); hv[j].nb.push({n:i,o:b.order}); }
  });
  return hv;
}
function connectedComponents(hv){
  const seen=new Array(hv.length).fill(false), comps=[];
  for(let s=0;s<hv.length;s++){ if(seen[s]) continue;
    const st=[s], comp=[]; seen[s]=true;
    while(st.length){ const c=st.pop(); comp.push(c);
      hv[c].nb.forEach(e=>{ if(!seen[e.n]){seen[e.n]=true; st.push(e.n);} }); }
    comps.push(comp);
  }
  return comps;
}
/* rings via cycle rank + BFS smallest cycle through each extra bond */
function findRings(hv){
  const n=hv.length; if(!n) return [];
  let m=0; hv.forEach((a,i)=>a.nb.forEach(e=>{ if(e.n>i) m++; }));
  const comps=connectedComponents(hv);
  const rank=m-n+comps.length;
  if(rank<=0) return [];
  // spanning tree, extra edges → cycles
  const inTree=new Set(), seen=new Array(n).fill(false), parent=new Array(n).fill(-1);
  const rings=[];
  comps.forEach(comp=>{
    const st=[comp[0]]; seen[comp[0]]=true;
    while(st.length){ const c=st.pop();
      hv[c].nb.forEach(e=>{ if(!seen[e.n]){ seen[e.n]=true; parent[e.n]=c; inTree.add(key(c,e.n)); st.push(e.n);} });
    }
  });
  function key(a,b){return a<b? a+"_"+b : b+"_"+a;}
  const done=new Set();
  hv.forEach((a,i)=>a.nb.forEach(e=>{
    if(e.n<i) return;
    const k=key(i,e.n);
    if(inTree.has(k)||done.has(k)) return;
    done.add(k);
    // path i..root and e.n..root → cycle
    const pi=[], pj=[];
    for(let x=i;x>=0;x=parent[x]) pi.push(x);
    for(let x=e.n;x>=0;x=parent[x]) pj.push(x);
    const si=new Set(pi); let lca=-1;
    for(const x of pj){ if(si.has(x)){lca=x;break;} }
    if(lca<0) return;
    const ring=[];
    for(const x of pi){ ring.push(x); if(x===lca)break; }
    const tail=[];
    for(const x of pj){ if(x===lca)break; tail.push(x); }
    rings.push(ring.concat(tail.reverse()));
  }));
  return rings;
}
function bondOrderBetween(hv,i,j){ const e=hv[i].nb.find(x=>x.n===j); return e?e.o:0; }
function isBenzeneRing(hv,ring){
  if(ring.length!==6) return false;
  if(!ring.every(i=>hv[i].el==="C")) return false;
  let d=0;
  for(let k=0;k<6;k++){ const o=bondOrderBetween(hv,ring[k],ring[(k+1)%6]); if(o===2)d++; else if(o!==1) return false; }
  return d===3;
}

/* functional group detection on heavy view */
function detectGroups(hv){
  const used=new Set(); // heavy indices consumed by groups (hetero atoms)
  const gs=[]; // {type,c,het:[...]}  c = chain-relevant carbon (or -1)
  const el=i=>hv[i].el;
  const deg=i=>hv[i].nb.length;
  // helper: O that is =O to c and has no other neighbor
  const carbonylO=c=>hv[c].nb.find(e=>el(e.n)==="O"&&e.o===2&&deg(e.n)===1);
  const singleO =c=>hv[c].nb.filter(e=>el(e.n)==="O"&&e.o===1);
  for(let c=0;c<hv.length;c++){
    if(el(c)!=="C") continue;
    let co=carbonylO(c);
    if(co&&used.has(co.n)) co=null; // already consumed (e.g. far side of an anhydride)
    if(co){
      const sO=singleO(c).filter(e=>!used.has(e.n));
      // acid: C(=O)-OH
      const oh=sO.find(e=>deg(e.n)===1&&hv[e.n].h>=1 || (deg(e.n)===1&&hv[e.n].charge===-1));
      // ester / anhydride: C(=O)-O-C
      const orLink=sO.find(e=>deg(e.n)===2);
      if(oh){ gs.push({type:"acid",c,het:[co.n,oh.n]}); used.add(co.n); used.add(oh.n); continue; }
      if(orLink){
        const O=orLink.n;
        const other=hv[O].nb.find(e=>e.n!==c);
        if(other && el(other.n)==="C" && carbonylO(other.n)){
          // anhydride (register once, from lower index)
          const oco=carbonylO(other.n);
          if(c<other.n){ gs.push({type:"anhydride",c,c2:other.n,o:O,het:[co.n,O,oco.n]}); used.add(co.n);used.add(O);used.add(oco.n); }
          continue;
        }
        if(other && el(other.n)==="C"){ gs.push({type:"ester",c,oAlkylC:other.n,o:O,het:[co.n,O]}); used.add(co.n); used.add(O); continue; }
      }
      // amide: C(=O)-N
      const nAm=hv[c].nb.find(e=>el(e.n)==="N"&&e.o===1&&!used.has(e.n));
      if(nAm){ gs.push({type:"amide",c,het:[co.n,nAm.n]}); used.add(co.n); used.add(nAm.n); continue; }
      // aldehyde vs ketone
      const cNbs=hv[c].nb.filter(e=>el(e.n)==="C").length;
      if(cNbs<=1 && hv[c].h>=1){ gs.push({type:"aldehyde",c,het:[co.n]}); used.add(co.n); }
      else { gs.push({type:"ketone",c,het:[co.n]}); used.add(co.n); }
      continue;
    }
    // nitrile C≡N
    const nT=hv[c].nb.find(e=>el(e.n)==="N"&&e.o===3&&deg(e.n)===1);
    if(nT){ gs.push({type:"nitrile",c,het:[nT.n]}); used.add(nT.n); continue; }
  }
  for(let c=0;c<hv.length;c++){
    if(el(c)!=="C") continue;
    hv[c].nb.forEach(e=>{
      if(used.has(e.n)) return;
      const s=el(e.n);
      if(s==="O"&&e.o===1&&deg(e.n)===1){
        if(hv[e.n].charge===-1){ gs.push({type:"ol",c,het:[e.n],anion:true}); used.add(e.n); }
        else if(hv[e.n].h>=1){ gs.push({type:"ol",c,het:[e.n]}); used.add(e.n); }
      } else if(s==="O"&&e.o===1&&deg(e.n)===2){
        const other=hv[e.n].nb.find(x=>x.n!==c);
        if(other&&el(other.n)==="C"){ // ether (register from lower C)
          if(c<other.n){ gs.push({type:"ether",c,c2:other.n,o:e.n,het:[e.n]}); used.add(e.n); }
        }
      } else if(s==="S"&&e.o===1&&deg(e.n)===1&&hv[e.n].h>=1){
        gs.push({type:"thiol",c,het:[e.n]}); used.add(e.n);
      } else if(s==="N"&&e.o===1&&deg(e.n)===1+ (hv[e.n].nb.filter(x=>el(x.n)==="O").length*0)){
        // plain amine N (only this C neighbor) — N with multiple C = sec/tert, handled if all nbs are C
      } else if(HALO[s]&&deg(e.n)===1){
        gs.push({type:"halo",c,el:s,het:[e.n]}); used.add(e.n);
      }
    });
  }
  // amines & nitro (N-centered)
  for(let n=0;n<hv.length;n++){
    if(el(n)!=="N"||used.has(n)) continue;
    const os=hv[n].nb.filter(e=>el(e.n)==="O"&&deg(e.n)===1);
    const cs=hv[n].nb.filter(e=>el(e.n)==="C"&&e.o===1);
    if(os.length===2&&cs.length===1){ // nitro
      gs.push({type:"nitro",c:cs[0].n,het:[n,os[0].n,os[1].n]});
      used.add(n); os.forEach(o=>used.add(o.n));
      continue;
    }
    if(cs.length>=1 && hv[n].nb.every(e=>el(e.n)==="C"&&e.o===1) && !hv[n].charge){
      gs.push({type:"amine",c:cs[0].n,n,allC:cs.map(e=>e.n),het:[n]});
      used.add(n);
    }
  }
  return {groups:gs,used};
}

/* ---- carbon subgraph + chains ---- */
function carbonAdj(hv){
  const map=new Map();
  hv.forEach((a,i)=>{ if(a.el==="C") map.set(i,[]); });
  hv.forEach((a,i)=>{ if(a.el!=="C")return;
    a.nb.forEach(e=>{ if(hv[e.n].el==="C") map.get(i).push(e); }); });
  return map;
}
function allChains(cAdj,limitFrom){
  // all maximal simple paths in carbon graph (capped)
  const chains=[]; let steps=0;
  const nodes=limitFrom|| [...cAdj.keys()];
  for(const s of nodes){
    const vis=new Set([s]);
    (function dfs(path){
      if(++steps>60000) return;
      const last=path[path.length-1];
      let ext=false;
      for(const e of (cAdj.get(last)||[])){
        if(!vis.has(e.n)){ vis.add(e.n); ext=true; dfs([...path,e.n]); vis.delete(e.n); }
      }
      if(!ext) chains.push([...path]);
    })([s]);
  }
  return chains;
}
function locantsCmp(A,B){ // lower locant set wins at first difference
  for(let i=0;i<Math.max(A.length,B.length);i++){
    const a=A[i]??1e9, b=B[i]??1e9;
    if(a!==b) return a-b;
  }
  return 0;
}
// locants of all prefix-type groups + alkyl branches for a given numbering
function prefLocs(hv,gs,principal,arr,pos){
  const out=[]; const inP=new Set(arr);
  gs.forEach(g=>{
    if(principal&&principal.list.includes(g)) return;
    if(g.type==="ether"){ const c=inP.has(g.c)?g.c:g.c2; if(pos.has(c)) out.push(pos.get(c)); return; }
    if(pos.has(g.c)) out.push(pos.get(g.c));
  });
  arr.forEach(c=>{
    hv[c].nb.forEach(e=>{ if(!inP.has(e.n)&&hv[e.n].el==="C") out.push(pos.get(c)); });
  });
  return out.sort((a,b)=>a-b);
}

/* ---- name assembly helpers ---- */
function hydroName(len,dL,tL,lang,cyclo,nextSuffixVowel){
  let s=(cyclo?(lang==="en"?"cyclo":"cyclo"):"")+STEM[len];
  const parts=[];
  if(dL.length){ const m=MULT[dL.length]||""; parts.push({loc:dL,m,end:lang==="en"?"ene":"en"}); }
  if(tL.length){ const m=MULT[tL.length]||""; parts.push({loc:tL,m,end:lang==="en"?"yne":"in"}); }
  if(!parts.length){
    s+= "an"+(lang==="en"&&!nextSuffixVowel? "e":"");
    if(lang==="de"&&false) s+="";
    return s;
  }
  parts.forEach((p,pi)=>{
    const needA=p.m&&!/[aeiou]$/.test(s)? "a":"";
    const showLoc=len>2||p.loc.length>1;
    s+= needA + (showLoc? "-"+p.loc.join(",")+"-" : (pi===0&&p.m?"":"")) + p.m + p.end;
    if(pi<parts.length-1) s=s.replace(/e$/,"");
  });
  if(lang==="en"&&nextSuffixVowel) s=s.replace(/e$/,"");
  if(lang==="de") s=s.replace(/ene$/,"en").replace(/yne$/,"in");
  return s;
}
function alphaKey(n){ return n.replace(/^\(|\)$/g,"").replace(/^\d+[\d,]*-/,"").replace(/^(di|tri|tetra|penta|hexa)(?=[a-z])/,""); }
function buildPrefixPart(prefixes,lang,dropLocs){
  // prefixes: [{name:{en,de}, loc:[..]}] grouped by name
  const g={};
  prefixes.forEach(p=>{
    const nm=p.name[lang];
    (g[nm]=g[nm]||[]).push(...p.loc);
  });
  const items=Object.keys(g).map(nm=>{
    const locs=g[nm].sort((a,b)=>a-b);
    const complex=nm.startsWith("(");
    const m= locs.length>1? (complex? ["","","bis","tris","tetrakis"][locs.length]||MULT[locs.length] : MULT[locs.length]) :"";
    const locStr=(!dropLocs&&locs.some(x=>x>0))? locs.join(",")+"-" : "";
    return {key:alphaKey(nm), text:locStr+m+nm};
  });
  items.sort((a,b)=>a.key<b.key?-1:1);
  return items.map(x=>x.text).join("-");
}
function finalize(lang,str){
  str=str.replace(/--+/g,"-").replace(/^-|-$/g,"");
  if(lang==="de") str=str.replace(/[a-zäöü]/,c=>c.toUpperCase());
  return str;
}

/* substituent (pure alkyl / phenyl) naming; returns {en,de} or null */
function nameBranch(hv,start,fromChainAtom,ringsInfo){
  const seen=new Set([fromChainAtom,start]);
  const q=[start], memb=[start];
  while(q.length){ const c=q.pop();
    for(const e of hv[c].nb){ if(!seen.has(e.n)){ seen.add(e.n); memb.push(e.n); q.push(e.n); } } }
  // benzene branch?
  const bz=ringsInfo.benzene.find(r=>r.every(x=>memb.includes(x)));
  if(bz && memb.length===6) return {en:"phenyl",de:"phenyl"};
  if(memb.some(i=>hv[i].el!=="C")) return null;         // hetero branch → fallback
  if(ringsInfo.rings.some(r=>r.every(x=>memb.includes(x)))){
    const r=ringsInfo.rings.find(r=>r.every(x=>memb.includes(x)));
    if(r && memb.length===r.length){ const nm="cyclo"+STEM[r.length]+"yl"; return {en:nm,de:nm}; }
    return null;
  }
  // linear/branched alkyl via recursive longest path from attachment
  const sub=new Set(memb);
  function longestFrom(node,ban){
    let best=[node];
    for(const e of hv[node].nb){
      if(!sub.has(e.n)||ban.has(e.n)) continue;
      ban.add(e.n);
      const p=longestFrom(e.n,ban);
      ban.delete(e.n);
      if(p.length+1>best.length) best=[node,...p];
    }
    return best;
  }
  const chain=longestFrom(start,new Set([start]));
  const cs=new Set(chain);
  let inner=[];
  chain.forEach((c,pos)=>{
    hv[c].nb.forEach(e=>{
      if(!sub.has(e.n)||cs.has(e.n)) return;
      if(pos===0&&e.n===fromChainAtom) return;
      const bn=nameBranch(hv,e.n,c,ringsInfo);
      if(!bn){ inner=null; return; }
      if(inner) inner.push({loc:pos+1,name:bn});
    });
  });
  if(inner===null) return null;
  const base=STEM[chain.length]+"yl";
  if(!inner.length) return {en:base,de:base};
  const en="("+buildPrefixPart(inner.map(x=>({name:{en:x.name.en,de:x.name.de},loc:[x.loc]})),"en")+base+")";
  const de="("+buildPrefixPart(inner.map(x=>({name:{en:x.name.en,de:x.name.de},loc:[x.loc]})),"de")+base+")";
  return {en,de};
}

/* acyl / alkyl piece namers for esters & anhydrides (simple linear only) */
function acylChainName(hv,cAdj,acylC,lang){
  // longest chain starting at acyl carbon
  const chains=allChains(cAdj,[acylC]).filter(ch=>ch[0]===acylC);
  if(!chains.length) return null;
  chains.sort((a,b)=>b.length-a.length);
  const ch=chains[0];
  // ensure no branches for simplicity
  return {len:ch.length,chain:ch};
}

/* ---- MAIN ANALYSIS ---- */
function analyze(){
  if(!atoms.length) return {err:"Draw a molecule first."};
  const hv=heavyView();
  const comps=connectedComponents(hv);
  if(comps.length>1 && hv.length>0) return {err:"Multiple separate fragments — connect them (or clear leftovers) before naming."};
  const formula=molFormula();
  if(SPECIALS[formula.str]) return {en:SPECIALS[formula.str].en,de:SPECIALS[formula.str].de,via:"local",formula:formula.str};

  const nC=hv.filter(a=>a.el==="C").length;
  if(nC===0){
    if(hv.length===1){ const s=hv[0].el; return {en:s+" ("+formula.str+")",de:s+" ("+formula.str+")",via:"local",formula:formula.str,note:"Single atom / no carbon skeleton — showing formula. Use online lookup for a proper name."}; }
    return {fallback:true,reason:"No carbon skeleton — the local engine covers organic molecules. Trying PubChem…",formula:formula.str};
  }
  const rings=findRings(hv);
  const benzene=rings.filter(r=>isBenzeneRing(hv,r));
  const ringsInfo={rings,benzene};
  const carbonRings=rings.filter(r=>r.every(i=>hv[i].el==="C"));
  if(rings.length>1) return {fallback:true,reason:"Fused / multi-ring systems exceed the local engine.",formula:formula.str};
  if(rings.length===1 && !carbonRings.length) return {fallback:true,reason:"Heterocycles exceed the local engine.",formula:formula.str};

  const det=detectGroups(hv);
  const gs=det.groups;
  // any hetero atom not consumed by a recognized group → fallback
  for(let i=0;i<hv.length;i++){
    if(hv[i].el==="C") continue;
    if(!det.used.has(i)) return {fallback:true,reason:"Contains a "+hv[i].el+" environment the local engine doesn't classify.",formula:formula.str};
  }
  // composite parents first
  const anh=gs.find(g=>g.type==="anhydride");
  if(anh){
    const cAdj=carbonAdj(hv);
    const p1=acylChainName(hv,cAdj,anh.c), p2=acylChainName(hv,cAdj,anh.c2);
    if(!p1||!p2||gs.some(g=>g!==anh)) return {fallback:true,reason:"Complex anhydride — using online lookup.",formula:formula.str};
    if(p1.len===p2.len){
      const st=STEM[p1.len];
      return {en:st+"anoic anhydride",de:finalize("de",st+"ansäureanhydrid"),via:"local",formula:formula.str};
    }
    const a=STEM[Math.min(p1.len,p2.len)], b=STEM[Math.max(p1.len,p2.len)];
    return {en:a+"anoic "+b+"anoic anhydride",de:finalize("de",a+"ansäure-"+b+"ansäureanhydrid"),via:"local",formula:formula.str};
  }
  const est=gs.find(g=>g.type==="ester");
  if(est){
    if(gs.some(g=>g!==est&&g.type!=="halo")) return {fallback:true,reason:"Ester with extra groups — using online lookup.",formula:formula.str};
    const cAdj=carbonAdj(hv);
    // split: acyl side (contains est.c, not through O) / alkyl side (est.oAlkylC)
    const acyl=acylChainName(hv,cAdj,est.c);
    const alkylBranch=nameBranch(hv,est.oAlkylC,est.o,ringsInfo);
    if(!acyl||!alkylBranch) return {fallback:true,reason:"Branched ester — using online lookup.",formula:formula.str};
    // acyl chain length counted only on acyl side: exclude alkyl side carbons
    const st=STEM[acyl.len];
    const alkE=alkylBranch.en.replace(/[()]/g,""), alkD=alkylBranch.de.replace(/[()]/g,"");
    return {en:alkE+" "+st+"anoate",de:finalize("de",st+"ansäure"+alkD+"ester"),via:"local",formula:formula.str};
  }
  // ethers: convert to alkoxy prefixes — pick larger side as parent later; mark smaller side
  // (handled below by treating O-C_small as prefix on C_large chain)

  // principal group selection
  const suffixable=gs.filter(g=>GROUPS[g.type]);
  let principal=null;
  if(suffixable.length){
    const best=Math.max(...suffixable.map(g=>GROUPS[g.type].sen));
    const top=suffixable.filter(g=>GROUPS[g.type].sen===best);
    principal={type:top[0].type,list:top};
  }
  // parent: ring vs chain
  const cAdj=carbonAdj(hv);
  const ring=carbonRings[0]||null;
  const useRing = ring && (!principal || principal.list.some(g=>ring.includes(g.c)));
  if(ring && !useRing && principal){
    // ring becomes substituent — allowed via nameBranch(cycloalkyl/phenyl)
  }
  let res;
  if(useRing) res=nameRingParent(hv,ring,ringsInfo,gs,principal,formula);
  else res=nameChainParent(hv,cAdj,ringsInfo,gs,principal,formula);
  return res;
}

function collectPrefixGroups(hv,gs,principal,posOf){
  // returns prefixes [{name:{en,de},loc:[n]}] , suffix locants, N-subs for amine/amide, ok flag
  const prefixes=[]; const sufLoc=[]; let ok=true; let nSubs=[];
  gs.forEach(g=>{
    const isPrincipal=principal&&principal.list.includes(g);
    const pos=posOf(g.c);
    if(isPrincipal){
      if(pos===undefined){ ok=false; return; }
      sufLoc.push(pos);
      if(g.type==="amine"&&g.allC&&g.allC.length>1){
        // N-substituents
        g.allC.forEach(cx=>{ if(posOf(cx)===undefined){
          // branch on N
          nSubs.push(cx);
        }});
      }
      return;
    }
    switch(g.type){
      case "halo": if(pos===undefined){ok=false;return;} prefixes.push({name:{en:HALO[g.el].en,de:HALO[g.el].de},loc:[pos]}); break;
      case "nitro": if(pos===undefined){ok=false;return;} prefixes.push({name:{en:"nitro",de:"nitro"},loc:[pos]}); break;
      case "ether": ok=ok&&"ether-handled"; prefixes.push({ether:g}); break;
      default:{
        const G=GROUPS[g.type];
        if(!G||!G.prefEN){ ok=false; return; }
        if(pos===undefined){ ok=false; return; }
        prefixes.push({name:{en:G.prefEN,de:G.prefDE},loc:[pos]});
      }
    }
  });
  return {prefixes,sufLoc,ok,nSubs};
}

function nameChainParent(hv,cAdj,ringsInfo,gs,principal,formula){
  const chains=allChains(cAdj);
  if(!chains.length) return {fallback:true,reason:"No carbon chain found.",formula:formula.str};
  const pgCs=principal? new Set(principal.list.map(g=>g.c)) : new Set();
  // score candidates
  let best=null;
  for(const ch of chains){
    const inCh=new Set(ch);
    const pg=[...pgCs].filter(c=>inCh.has(c)).length;
    let unsat=0;
    for(let i=0;i<ch.length-1;i++){ const o=bondOrderBetween(hv,ch[i],ch[i+1]); if(o>1) unsat++; }
    const key=[pg,unsat,ch.length];
    if(!best||key[0]>best.key[0]||(key[0]===best.key[0]&&(key[1]>best.key[1]||(key[1]===best.key[1]&&key[2]>best.key[2])))){
      best={ch,key};
    }
  }
  const ch=best.ch;
  if(principal && best.key[0]<principal.list.length)
    return {fallback:true,reason:"Principal groups sit on separate branches — using online lookup.",formula:formula.str};
  // terminal-required principal groups must be at chain end
  if(principal && GROUPS[principal.type].terminal){
    const t=principal.list.every(g=>g.c===ch[0]||g.c===ch[ch.length-1]);
    if(!t) return {fallback:true,reason:"Acid/aldehyde/nitrile carbon must terminate the chain — adjust drawing or use lookup.",formula:formula.str};
  }
  // choose direction
  const tryDir=dir=>{
    const arr=dir===1? ch: [...ch].reverse();
    const pos=new Map(); arr.forEach((c,i)=>pos.set(c,i+1));
    const sufL=principal? principal.list.map(g=>pos.get(g.c)).sort((a,b)=>a-b):[];
    const dL=[],tL=[];
    for(let i=0;i<arr.length-1;i++){ const o=bondOrderBetween(hv,arr[i],arr[i+1]);
      if(o===2)dL.push(i+1); else if(o===3)tL.push(i+1); }
    return {arr,pos,sufL,dL,tL};
  };
  const f=tryDir(1), r=tryDir(-1);
  const rank=x=>[x.sufL,[...x.dL,...x.tL].sort((a,b)=>a-b),prefLocs(hv,gs,principal,x.arr,x.pos)];
  const [rf,rr]=[rank(f),rank(r)];
  let use=f;
  for(let k=0;k<3;k++){ const c=locantsCmp(rf[k],rr[k]); if(c<0){use=f;break;} if(c>0){use=r;break;} }

  return assembleName(hv,use,gs,principal,ringsInfo,formula,false);
}

function nameRingParent(hv,ring,ringsInfo,gs,principal,formula){
  const isBz=isBenzeneRing(hv,ring);
  const n=ring.length;
  // candidate numberings: n rotations × 2 directions
  const cands=[];
  for(let s=0;s<n;s++){
    for(const dir of [1,-1]){
      const arr=[];
      for(let k=0;k<n;k++) arr.push(ring[( (s+dir*k)%n +n)%n]);
      const pos=new Map(); arr.forEach((c,i)=>pos.set(c,i+1));
      const sufL=principal? principal.list.filter(g=>pos.has(g.c)).map(g=>pos.get(g.c)).sort((a,b)=>a-b):[];
      const dL=[],tL=[];
      if(!isBz) for(let k=0;k<n;k++){ const o=bondOrderBetween(hv,arr[k],arr[(k+1)%n]);
        const loc=Math.min(k+1, k+2>n? 1: k+2); if(o===2)dL.push(k+1===n?1:k+1); else if(o===3)tL.push(k+1===n?1:k+1); }
      dL.sort((a,b)=>a-b); tL.sort((a,b)=>a-b);
      cands.push({arr,pos,sufL,dL,tL});
    }
  }
  cands.sort((A,B)=>locantsCmp(A.sufL,B.sufL)
    ||locantsCmp([...A.dL,...A.tL].sort((x,y)=>x-y),[...B.dL,...B.tL].sort((x,y)=>x-y))
    ||locantsCmp(prefLocs(hv,gs,principal,A.arr,A.pos),prefLocs(hv,gs,principal,B.arr,B.pos)));
  const use=cands[0];
  return assembleName(hv,use,gs,principal,ringsInfo,formula,{cyclo:!isBz,benzene:isBz,size:n});
}

function assembleName(hv,use,gs,principal,ringsInfo,formula,ringMode){
  const {arr,pos}=use;
  const posOf=c=>pos.get(c);
  const col=collectPrefixGroups(hv,gs,principal,posOf);
  if(col.ok===false) return {fallback:true,reason:"A functional group sits off the main chain — using online lookup.",formula:formula.str};
  const prefixes=col.prefixes.filter(p=>!p.ether);
  const ethers=col.prefixes.filter(p=>p.ether);
  const inParent=new Set(arr);
  // ethers → alkoxy prefix; smaller side must be pure alkyl OUTSIDE parent
  for(const {ether} of ethers){
    let cIn,cOut;
    if(inParent.has(ether.c)&&!inParent.has(ether.c2)){cIn=ether.c;cOut=ether.c2;}
    else if(inParent.has(ether.c2)&&!inParent.has(ether.c)){cIn=ether.c2;cOut=ether.c;}
    else return {fallback:true,reason:"Ether topology too complex — using online lookup.",formula:formula.str};
    const br=nameBranch(hv,cOut,ether.o,ringsInfo);
    if(!br||br.en.includes("(")) return {fallback:true,reason:"Branched ether side — using online lookup.",formula:formula.str};
    const oxyE=br.en==="phenyl"?"phenoxy":br.en.replace(/yl$/,"oxy");
    const oxyD=br.de==="phenyl"?"phenoxy":br.de.replace(/yl$/,"oxy");
    prefixes.push({name:{en:oxyE,de:oxyD},loc:[posOf(cIn)]});
  }
  // alkyl substituents: carbon neighbors outside parent, not consumed by groups
  const consumed=new Set();
  gs.forEach(g=>{ if(g.type==="ester"){consumed.add(g.oAlkylC);} if(g.het) g.het.forEach(h=>consumed.add(h)); if(g.type==="amine"&&g.allC) g.allC.forEach((cx,ix)=>{ }); });
  const nSubNames=[];
  if(principal&&principal.type==="amine"){
    principal.list.forEach(g=>{ g.allC.forEach(cx=>{ if(!inParent.has(cx)){
      const br=nameBranch(hv,cx,g.n===undefined?-1:g.n,ringsInfo);
      if(br) nSubNames.push(br); }; }); });
  }
  let bad=false;
  arr.forEach(c=>{
    hv[c].nb.forEach(e=>{
      if(bad||inParent.has(e.n)||hv[e.n].el!=="C") return;
      // skip carbons that belong to groups (acyl of ester alkyl side etc.) — only pure branches
      if(gs.some(g=>(g.type==="ester"&&(e.n===g.oAlkylC))||(g.type==="ether"&&(e.n===g.c||e.n===g.c2)&&false))) return;
      // skip branch if it is reached through a group heteroatom — can't be from C neighbor, fine
      const br=nameBranch(hv,e.n,c,ringsInfo);
      if(!br){ bad=true; return; }
      prefixes.push({name:br,loc:[posOf(c)]});
    });
  });
  if(bad) return {fallback:true,reason:"A substituent contains features beyond the local engine.",formula:formula.str};

  const build=lang=>{
    const G=principal? GROUPS[principal.type]:null;
    let suffix="", sufLocStr="";
    const cnt=use.sufL.length;
    if(G){
      const m=cnt>1? MULT[cnt]:"";
      const base=lang==="en"? G.sufEN:G.sufDE;
      const needLoc=G.locSuffix&&(arr.length>2||cnt>1);
      sufLocStr=needLoc? "-"+use.sufL.join(",")+"-" : (cnt>1&&G.terminal?"":"");
      if(cnt>1&&G.terminal&&["acid","nitrile","amide","aldehyde"].includes(principal.type)){
        suffix=(lang==="en"? {acid:"dioic acid",nitrile:"dinitrile",amide:"diamide",aldehyde:"dial"}[principal.type]
                            : {acid:"disäure",nitrile:"dinitril",amide:"diamid",aldehyde:"dial"}[principal.type]);
        sufLocStr="";
      } else suffix=m+base;
    }
    const sufStartsVowel=/^[aeiouy]/.test(suffix)&&!(suffix.startsWith("d")||suffix.startsWith("t"));
    const vowelNext=/^[aeiou]/.test((cnt>1?MULT[cnt]:"")+ (G? (lang==="en"?G.sufEN:G.sufDE):""));
    let core;
    if(ringMode&&ringMode.benzene){
      core=lang==="en"?"benzen":"benzol";
      if(!G) core=lang==="en"?"benzene":"benzol";
      else if(!vowelNext) core=lang==="en"?"benzene":"benzol";
    } else {
      core=hydroName(arr.length,use.dL,use.tL,lang,ringMode&&ringMode.cyclo,vowelNext&&!!G);
    }
    // N-substituents (amines/amides)
    let nPart="";
    if(nSubNames.length){
      const list=nSubNames.map(x=>x[lang].replace(/[()]/g,"")).sort();
      nPart=list.map(x=>"N-"+x).join("-");
    }
    const totalLocs=prefixes.reduce((a,p)=>a+p.loc.length,0);
    const dropLocs=arr.length===1||(arr.length===2&&totalLocs===1)
      ||(!!ringMode&&totalLocs===1&&!use.sufL.length);
    const prefPart=buildPrefixPart(prefixes,lang,dropLocs);
    let full=nPart+(nPart&&prefPart?"-":"")+(prefPart? prefPart:"")+core+(G? (sufLocStr||(G.locSuffix&&arr.length>2?"":"")):"")+suffix;
    if(G&&!sufLocStr&&suffix&&!full.endsWith(suffix)) full+=suffix;
    if(lang==="en") full=full.replace(/ane(?=ol|al|one|amine|oic)/,"an");
    return finalize(lang,full);
  };
  let en=build("en"), de=build("de");
  const RETAINED={ "benzen-1-ol":["phenol","Phenol"], "methylbenzene":["toluene (methylbenzene)","Toluol (Methylbenzol)"] };
  if(RETAINED[en]){ de=RETAINED[en][1]; en=RETAINED[en][0]; }
  return {en,de,via:"local",formula:formula.str};
}

/* ================= SMILES EXPORT (for PubChem lookup) ================= */
const ORGANIC=new Set(["B","C","N","O","P","S","F","Cl","Br","I"]);
function toSMILES(){
  const hv=heavyView();
  if(!hv.length) return null;
  const visited=new Array(hv.length).fill(false);
  const ringBonds=new Map(); let ringNum=1;
  const bondSym=o=>o===2?"=":o===3?"#":"";
  // detect ring-closure edges via DFS
  const closure=[];
  function atomStr(i){
    const a=hv[i];
    const normal=ORGANIC.has(a.el)&&!a.charge&&implicitOk(a);
    if(normal) return a.el;
    const h=a.h>0? "H"+(a.h>1?a.h:""):"";
    const c=a.charge? (a.charge>0? "+"+(a.charge>1?a.charge:""):"-"+(a.charge<-1?-a.charge:"")):"";
    return "["+a.el+h+c+"]";
  }
  function implicitOk(a){
    const v=VALENCE[a.el]; if(!v) return false;
    let s=a.h; a.nb.forEach(e=>s+=e.o);
    return v.includes(s);
  }
  const isClosure=(i,j)=>closure.some(c=>(c.a===i&&c.b===j)||(c.a===j&&c.b===i));
  function dfs(i,parent){
    visited[i]=true;
    let s=atomStr(i);
    // ring closure digits at this atom
    for(const c of closure){ if(c.a===i||c.b===i) s+=bondSym(c.o)+(c.num>9?"%"+c.num:c.num); }
    const branches=[];
    for(const e of hv[i].nb){
      if(e.n===parent) continue;
      if(isClosure(i,e.n)) continue;      // represented by ring-closure digit
      branches.push(e);
    }
    const parts=[];
    for(const e of branches){
      if(visited[e.n]) continue;          // may have been reached via another branch
      parts.push(bondSym(e.o)+dfs(e.n,i));
    }
    parts.forEach((p,pi)=>{ s+= pi<parts.length-1? "("+p+")": p; });
    return s;
  }
  // pre-pass: find ring closure edges with a DFS
  const seen=new Array(hv.length).fill(false);
  function pre(i,parent){
    seen[i]=true;
    for(const e of hv[i].nb){
      if(e.n===parent) continue;
      if(seen[e.n]){
        if(!closure.some(c=>(c.a===i&&c.b===e.n)||(c.a===e.n&&c.b===i)))
          closure.push({a:i,b:e.n,o:e.o,num:ringNum++});
      } else pre(e.n,i);
    }
  }
  const parts=[];
  for(let s=0;s<hv.length;s++) if(!seen[s]) pre(s,-1);
  visited.fill(false);
  for(let s=0;s<hv.length;s++) if(!visited[s]) parts.push(dfs(s,null));
  return parts.join(".");
}

/* ================= PUBCHEM ONLINE LOOKUP ================= */
async function pubchemName(smiles){
  const url="https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/smiles/property/IUPACName/JSON?smiles="+encodeURIComponent(smiles);
  const r=await fetch(url);
  if(!r.ok) throw new Error("PubChem: no match ("+r.status+")");
  const j=await r.json();
  const p=j.PropertyTable&&j.PropertyTable.Properties&&j.PropertyTable.Properties[0];
  if(!p||!p.IUPACName) throw new Error("PubChem returned no name");
  return p.IUPACName;
}

/* ================= RESULTS UI ================= */
function card(html,cls){
  const d=document.createElement("div");
  d.className="name-card "+(cls||"");
  d.innerHTML=html;
  return d;
}
function esc(s){return String(s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}
async function runNaming(){
  const body=$("resultsBody");
  openDrawer(); body.innerHTML="";
  const res=analyze();
  if(res.err){ body.appendChild(card(esc(res.err),"err")); return; }
  const fRow=`<div class="meta">Formula: <b>${esc(res.formula||molFormula().str)}</b></div>`;
  if(res.en){
    body.appendChild(card(`
      <div class="lang-row"><span class="lang">EN</span><span class="the-name">${esc(res.en)}</span></div>
      <div class="lang-row"><span class="lang">DE</span><span class="the-name">${esc(res.de)}</span></div>
      ${fRow}${res.note? `<div class="meta">${esc(res.note)}</div>`:""}
      <button class="copy" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(res.en).replace(/'/g,"\\'")}');this.textContent='Copied'">Copy EN</button>`));
  }
  // fallback / verification through PubChem
  if(res.fallback || res.en){
    const smiles=toSMILES();
    if(!smiles) return;
    const waitCard=card((res.fallback? esc(res.reason)+"<br/>":"")+
      `<div class="meta">Looking up the exact IUPAC name online (PubChem)…</div><div class="meta">SMILES: <code>${esc(smiles)}</code></div>`,"warn");
    body.appendChild(waitCard);
    try{
      const nm=await pubchemName(smiles);
      waitCard.replaceWith(card(`
        <div class="lang-row"><span class="lang">EN</span><span class="the-name">${esc(nm)}</span></div>
        <div class="meta">Exact IUPAC name via PubChem${res.en? " (cross-check of the local name)":""}</div>${res.en?"":fRow}
        <button class="copy" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(nm).replace(/'/g,"\\'")}');this.textContent='Copied'">Copy</button>`));
    }catch(err){
      waitCard.replaceWith(card((res.fallback? esc(res.reason)+"<br/>":"")+
        `<div class="meta">Online lookup unavailable (${esc(err.message)}). ${res.en? "Local name above still applies.":"Try simplifying the structure."}</div>${res.en?"":fRow}`, res.en? "warn":"err"));
    }
  }
}
$("nameBtn").onclick=runNaming;
